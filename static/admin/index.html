<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>后台管理 - 仪表盘</title>
</head>
<body>
    <script src="/static/admin/admin.js"></script>
    <script src="/static/js/socket.io.js"></script>

    <div class="container">
        <h1>仪表盘</h1>
        <div class="refresh-info">
            <span id="ws-status" style="color: #888; margin-right: 10px;"></span>
            上次更新：<span id="last-update-time">加载中...</span>
            <button onclick="loadStats()">刷新</button>
        </div>
        <div class="stats-row" id="basic-stats-row">
            <div class="card stat-card" data-key="users">
                <div class="label">注册用户</div>
                <div class="num" id="user-count">-</div>
            </div>
            <div class="card stat-card" data-key="videos">
                <div class="label">视频投稿</div>
                <div class="num" id="video-count">-</div>
            </div>
            <div class="card stat-card" data-key="all-videos">
                <div class="label">历史总数</div>
                <div class="num" id="all-videos-count">-</div>
            </div>
            <div class="card stat-card" data-key="comments">
                <div class="label">评论总数</div>
                <div class="num" id="comment-count">-</div>
            </div>
            <div class="card stat-card" data-key="private-videos">
                <div class="label">私密视频</div>
                <div class="num" id="private-videos-count">-</div>
            </div>
        </div>

        <h3>视频审核状态</h3>
        <div class="stats-row" id="audit-stats-row">
            <div class="card stat-card" data-key="pending">
                <div class="label">待审核</div>
                <div class="num" id="pending-videos-count" style="color: #f08c00;">-</div>
            </div>
            <div class="card stat-card" data-key="approved">
                <div class="label">已通过</div>
                <div class="num" id="approved-videos-count" style="color: #2f9e44;">-</div>
            </div>
            <div class="card stat-card" data-key="banned">
                <div class="label">已下架</div>
                <div class="num" id="banned-videos-count" style="color: #f04c49;">-</div>
            </div>
            <div class="card stat-card" data-key="appealing">
                <div class="label">申诉数</div>
                <div class="num" id="appealing-videos-count" style="color: #8b5cf6;">-</div>
            </div>
        </div>

        <h3>上传状态</h3>
        <div class="stats-row" id="upload-stats-row">
            <div class="card stat-card" draggable="true" data-key="upload-uploading">
                <div class="label">上传中</div>
                <div class="num" id="upload-uploading-count" style="color: #00a1d6;">-</div>
            </div>
            <div class="card stat-card" draggable="true" data-key="upload-completed">
                <div class="label">上传完成</div>
                <div class="num" id="upload-completed-count" style="color: #2f9e44;">-</div>
            </div>
            <div class="card stat-card" draggable="true" data-key="upload-cancelled">
                <div class="label">已取消</div>
                <div class="num" id="upload-cancelled-count" style="color: #999;">-</div>
            </div>
        </div>

        <h3>转码状态</h3>
        <div class="stats-row" id="transcode-stats-row">
            <div class="card stat-card" draggable="true" data-key="transcode-pending">
                <div class="label">等待转码</div>
                <div class="num" id="transcode-pending-count" style="color: #f08c00;">-</div>
            </div>
            <div class="card stat-card" draggable="true" data-key="transcode-processing">
                <div class="label">转码中</div>
                <div class="num" id="transcode-processing-count" style="color: #00a1d6;">-</div>
            </div>
            <div class="card stat-card" draggable="true" data-key="transcode-completed-today">
                <div class="label">今日完成</div>
                <div class="num" id="transcode-completed-count" style="color: #2f9e44;">-</div>
            </div>
        </div>

        <h2>服务器状态</h2>
        <div class="stats-row sortable" id="server-stats-row">
            <div class="card stat-card" draggable="true" data-key="cpu">
                <div class="label">CPU 使用率</div>
                <div class="num" id="cpu-stat">-</div>
            </div>
            <div class="card stat-card" draggable="true" data-key="mem">
                <div class="label">内存使用率</div>
                <div class="num" id="mem-stat">-</div>
            </div>
            <div class="card stat-card" draggable="true" data-key="disk">
                <div class="label">磁盘使用率</div>
                <div class="num" id="disk-stat">-</div>
            </div>
            <div class="card stat-card" draggable="true" data-key="net-sent">
                <div class="label">网络已发送</div>
                <div class="num" id="net-sent-stat">-</div>
            </div>
            <div class="card stat-card" draggable="true" data-key="net-recv">
                <div class="label">网络已接收</div>
                <div class="num" id="net-recv-stat">-</div>
            </div>
            <div class="card stat-card" draggable="true" data-key="net-sent-speed">
                <div class="label">上行网速</div>
                <div class="num" id="net-sent-speed-stat">-</div>
            </div>
            <div class="card stat-card" draggable="true" data-key="net-recv-speed">
                <div class="label">下行网速</div>
                <div class="num" id="net-recv-speed-stat">-</div>
            </div>
            <div class="card stat-card" draggable="true" data-key="conn">
                <div class="label">网络连接数</div>
                <div class="num" id="conn-count-stat">-</div>
            </div>
        </div>
    </div>

    <script>
        async function loadStats() {
            const token = localStorage.getItem("access_token");

            // Business Stats
            const res = await fetch("/admin/stats", {
                headers: { "Authorization": "Bearer " + token }
            });
            if (res.ok) {
                const data = await res.json();
                document.getElementById("user-count").innerText = data.users;
                document.getElementById("video-count").innerText = data.total_videos;
                document.getElementById("all-videos-count").innerText = data.all_videos;
                document.getElementById("private-videos-count").innerText = data.private_videos;
                document.getElementById("pending-videos-count").innerText = data.pending_videos_count;
                document.getElementById("approved-videos-count").innerText = data.approved_videos_count;
                document.getElementById("banned-videos-count").innerText = data.banned_videos_count;
                document.getElementById("appealing-videos-count").innerText = data.appealing_videos_count;
                document.getElementById("comment-count").innerText = data.comments;

                // 上传状态
                if (data.upload_uploading !== undefined) {
                    document.getElementById("upload-uploading-count").innerText = data.upload_uploading;
                    document.getElementById("upload-completed-count").innerText = data.upload_completed;
                    document.getElementById("upload-cancelled-count").innerText = data.upload_cancelled;
                }

                // 转码状态
                if (data.transcode_pending !== undefined) {
                    document.getElementById("transcode-pending-count").innerText = data.transcode_pending;
                    document.getElementById("transcode-processing-count").innerText = data.transcode_processing;
                    document.getElementById("transcode-completed-count").innerText = data.transcode_completed_today;
                }
            }

            // System Stats
            const resSys = await fetch("/admin/stats/system", {
                headers: { "Authorization": "Bearer " + token }
            });
            if (resSys.ok) {
                const data = await resSys.json();
                document.getElementById("cpu-stat").innerText = data.cpu_percent + "%";
                document.getElementById("mem-stat").innerText = data.memory.percent + "%";
                document.getElementById("disk-stat").innerText = data.disk.percent + "%";
                document.getElementById("net-sent-stat").innerText = formatBytes(data.network.bytes_sent);
                document.getElementById("net-recv-stat").innerText = formatBytes(data.network.bytes_recv);
                document.getElementById("conn-count-stat").innerText = data.connections_count;

                // 计算网速
                const now = Date.now();
                if (window._lastNetStats) {
                    const timeDelta = (now - window._lastNetStats.time) / 1000; // 秒
                    if (timeDelta > 0) {
                        const sentSpeed = (data.network.bytes_sent - window._lastNetStats.bytes_sent) / timeDelta;
                        const recvSpeed = (data.network.bytes_recv - window._lastNetStats.bytes_recv) / timeDelta;
                        document.getElementById("net-sent-speed-stat").innerText = formatBytes(sentSpeed) + '/s';
                        document.getElementById("net-recv-speed-stat").innerText = formatBytes(recvSpeed) + '/s';
                    }
                }
                window._lastNetStats = { time: now, bytes_sent: data.network.bytes_sent, bytes_recv: data.network.bytes_recv };
            }

            // 更新最后刷新时间
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ':' +
                           now.getMinutes().toString().padStart(2, '0') + ':' +
                           now.getSeconds().toString().padStart(2, '0');
            document.getElementById("last-update-time").innerText = timeStr;
        }

        // WebSocket 连接
        let socket = null;

        function connectWebSocket() {
            const token = localStorage.getItem("access_token");
            if (!token) return;

            socket = io('/', {
                auth: { token: token },
                transports: ['websocket', 'polling']
            });

            socket.on('connect', () => {
                console.log('✅ Admin dashboard WebSocket connected');
                const wsEl = document.getElementById("ws-status");
                if (wsEl) wsEl.textContent = '● WebSocket 已连接';
                if (wsEl) wsEl.style.color = '#2f9e44';
            });

            socket.on('disconnect', () => {
                console.log('⚠️ Admin dashboard WebSocket disconnected');
                const wsEl = document.getElementById("ws-status");
                if (wsEl) wsEl.textContent = '● WebSocket 已断开';
                if (wsEl) wsEl.style.color = '#f04c49';
            });

            // 监听数据更新事件（目前用轮询保底）
            socket.on('transcode_queue_changed', () => {
                // 仪表盘数据变化时刷新
                loadStats();
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            // 页面加载时立即加载数据
            loadStats();
            connectWebSocket();
            // 每 30 秒保底刷新一次
            setInterval(loadStats, 30000);
            // 设置 WebSocket 等待状态
            const wsEl = document.getElementById("ws-status");
            if (wsEl) {
                wsEl.textContent = '● WebSocket 连接中...';
                wsEl.style.color = '#f08c00';
            }
            // 初始化卡片拖拽排序
            initCardDragSort('basic-stats-row', 'dashboard_basic');
            initCardDragSort('audit-stats-row', 'dashboard_audit');
            initCardDragSort('upload-stats-row', 'dashboard_upload');
            initCardDragSort('transcode-stats-row', 'dashboard_transcode');
            initCardDragSort('server-stats-row', 'dashboard_server');
        });

        // 字节数格式化
        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }
    </script>
</body>
</html>

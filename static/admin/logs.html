<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>后台管理 - 操作日志</title>
</head>
<body>
    <script src="/static/admin/admin.js"></script>
    <div class="container">
        <h1>操作日志</h1>
        <div class="table-wrapper">
            <table class="table">
                <thead>
                    <tr>
                        <th>时间</th>
                        <th>管理员</th>
                        <th>动作</th>
                        <th>目标ID</th>
                        <th>详情</th>
                    </tr>
                </thead>
                <tbody id="logs-body"></tbody>
            </table>
        </div>
        <div id="logs-pagination" class="pagination" style="margin-top:20px; text-align:center;"></div>
    </div>

    <script>
        async function loadLogs(page = 1) {
            const token = localStorage.getItem("access_token");
            const pageSize = window.DEFAULT_PAGE_SIZE || 20;
            const res = await fetch(`/admin/logs?page=${page}&size=${pageSize}`, {
                headers: { "Authorization": "Bearer " + token }
            });
            if (res.ok) {
                const data = await res.json();
                const logs = data.logs || data;
                const total = data.total || logs.length;
                const totalPages = Math.ceil(total / pageSize);
                const tbody = document.getElementById("logs-body");
                tbody.innerHTML = "";
                logs.forEach(log => {
                    const tr = document.createElement("tr");
                    tr.innerHTML = `
                        <td>${new Date(log.created_at).toLocaleString()}</td>
                        <td>${log.admin ? log.admin.username : '-'}</td>
                        <td>${log.action}</td>
                        <td>${log.target_id || '-'}</td>
                        <td>${log.details || '-'}</td>
                    `;
                    tbody.appendChild(tr);
                });
                renderPagination("logs-pagination", page, totalPages, loadLogs);
            } else {
                alert("加载失败");
            }
        }
        document.addEventListener("DOMContentLoaded", async () => {
            await loadSiteConfig();
            loadLogs(1);
        });
    </script>
</body>
</html>

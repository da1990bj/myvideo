<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>后台管理 - 评论</title>
</head>
<body>
    <script src="/static/admin/admin.js"></script>

    <div class="container">
        <h1>评论管理</h1>
        <div class="table-wrapper">
            <table class="table">
                <thead>
                    <tr>
                        <th>用户</th>
                        <th>内容</th>
                        <th>时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="list"></tbody>
            </table>
        </div>
        <div id="comments-pagination" class="pagination" style="margin-top:20px; text-align:center;"></div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            await loadSiteConfig();
            loadComments(1);
        });

        async function loadComments(page = 1) {
            const token = localStorage.getItem("access_token");
            const pageSize = window.DEFAULT_PAGE_SIZE || 20;
            const res = await fetch(`/admin/comments?page=${page}&size=${pageSize}`, {
                headers: { "Authorization": "Bearer " + token }
            });
            if (res.ok) {
                const data = await res.json();
                const comments = data.comments || [];
                const total = data.total || 0;
                const totalPages = Math.ceil(total / pageSize);
                const tbody = document.getElementById("list");
                tbody.innerHTML = "";
                comments.forEach(c => {
                    const tr = document.createElement("tr");
                    const isDeleted = c.is_deleted;
                    tr.innerHTML = `
                        <td>${c.user ? c.user.username : '-'}</td>
                        <td style="max-width:400px;">${c.content}</td>
                        <td>${new Date(c.created_at).toLocaleString()}</td>
                        <td>
                            ${isDeleted
                                ? '<button class="btn btn-secondary" onclick="restoreComment(\'' + c.id + '\')">恢复</button>'
                                : '<button class="btn btn-danger" onclick="deleteComment(\'' + c.id + '\')">删除</button>'
                            }
                            <a href="/static/video.html?id=${c.video_id}" target="_blank" class="btn">查看视频</a>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
                renderPagination("comments-pagination", page, totalPages, loadComments);
            }
        }

        async function deleteComment(id) {
            if (!confirm("确定要删除这条评论吗？")) return;
            const token = localStorage.getItem("access_token");
            const res = await fetch(`/admin/comments/${id}`, {
                method: "DELETE",
                headers: { "Authorization": "Bearer " + token }
            });
            if (res.ok) loadComments();
        }

        async function restoreComment(id) {
            if (!confirm("确定要恢复这条评论吗？")) return;
            const token = localStorage.getItem("access_token");
            const res = await fetch(`/admin/comments/${id}/restore`, {
                method: "POST",
                headers: { "Authorization": "Bearer " + token }
            });
            if (res.ok) loadComments();
        }
    </script>
</body>
</html>

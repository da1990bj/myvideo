<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上传管理 - MyVideo 管理后台</title>
    <script src="/static/admin/admin.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; background: #f5f5f5; }
        .container { padding: 20px; max-width: 1600px; margin: 0 auto; }
        h1 { margin-bottom: 20px; color: #333; }

        .stats-row { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
        .stat-card {
            background: #fff; padding: 20px 30px; border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-align: center; flex: 1; min-width: 120px; max-width: 300px;
        }
        .stat-card .label { color: #888; font-size: 13px; margin-bottom: 8px; }
        .stat-card .num { font-size: 28px; font-weight: bold; }
        .stat-card.uploading .num { color: #00a1d6; }
        .stat-card.completed .num { color: #2f9e44; }
        .stat-card.cancelled .num { color: #999; }
        .stat-card.total .num { color: #666; }

        table { width: 100%; border-collapse: collapse; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #fafafa; font-weight: 500; color: #555; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background: #f9f9f9; }

        .status-badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }
        .status-processing { background: #e3f2fd; color: #00a1d6; }
        .status-completed { background: #e8f5e9; color: #2f9e44; }
        .status-cancelled { background: #f5f5f5; color: #999; }
        .status-paused { background: #fff8e1; color: #f08c00; }

        .progress-cell { font-weight: 500; color: #00a1d6; }
        .progress-cell.completed { color: #2f9e44; }
        .progress-cell.failed { color: #f04c49; }

        .btn { padding: 5px 12px; border-radius: 4px; border: 1px solid #ddd; cursor: pointer; background: #fff; font-size: 12px; transition: all 0.2s; }
        .btn:hover { background: #f5f5f5; }
        .btn-danger { color: #f04c49; border-color: #f04c49; }
        .btn-danger:hover { background: #ffebee; }

        .filter-row { margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .filter-row input, .filter-row select { padding: 6px 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        .filter-row input { min-width: 150px; }
        .filter-row select { min-width: 120px; }
        .filter-row button { padding: 6px 12px; background: #00a1d6; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .filter-row button:hover { background: #008dbd; }
        .filter-row button.secondary { background: #eee; color: #333; }
        .filter-row button.secondary:hover { background: #ddd; }
        .filter-row .count { margin-left: auto; color: #666; font-size: 13px; }

        .pagination { display: flex; gap: 10px; align-items: center; margin-top: 20px; justify-content: center; }
        .pagination button { padding: 6px 12px; border: 1px solid #ddd; background: #fff; border-radius: 4px; cursor: pointer; }
        .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
        .pagination span { color: #666; font-size: 14px; }

        .file-size { color: #888; font-size: 12px; }
        .filename { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        code { font-size: 11px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>上传管理</h1>

        <!-- 统计卡片 -->
        <div class="stats-row">
            <div class="stat-card uploading">
                <div class="label">上传中</div>
                <div class="num" id="uploadingCount">-</div>
            </div>
            <div class="stat-card completed">
                <div class="label">已完成</div>
                <div class="num" id="completedCount">-</div>
            </div>
            <div class="stat-card cancelled">
                <div class="label">已取消</div>
                <div class="num" id="cancelledCount">-</div>
            </div>
            <div class="stat-card total">
                <div class="label">全部</div>
                <div class="num" id="totalCount">-</div>
            </div>
        </div>

        <!-- 筛选栏 -->
        <div class="filter-row">
            <input type="text" id="filter-title" placeholder="标题搜索" oninput="applyFilters()">
            <input type="text" id="filter-author" placeholder="作者搜索" oninput="applyFilters()">
            <select id="filter-category" onchange="applyFilters()">
                <option value="">全部分类</option>
            </select>
            <select id="filter-status" onchange="applyFilters()">
                <option value="">全部状态</option>
                <option value="uploading">上传中</option>
                <option value="completed">已完成</option>
                <option value="cancelled">已取消</option>
            </select>
            <button onclick="clearFilters()" class="secondary">清除筛选</button>
            <span class="count" id="totalCountLabel">共 0 条记录</span>
        </div>

        <!-- 会话列表 -->
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>标题</th>
                    <th>分类</th>
                    <th>用户名</th>
                    <th>文件名</th>
                    <th>大小</th>
                    <th>进度</th>
                    <th>状态</th>
                    <th>创建时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="sessionsTable">
                <tr><td colspan="10" style="text-align:center;color:#999;">加载中...</td></tr>
            </tbody>
        </table>

        <!-- 分页 -->
        <div class="pagination" id="pagination"></div>
    </div>

    <script>
        let currentPage = 1;
        let pageSize = window.DEFAULT_PAGE_SIZE || 20;
        let totalSessions = 0;
        let categories = [];

        async function loadCategories() {
            try {
                const res = await fetch('/categories');
                if (res.ok) {
                    categories = await res.json();
                    const select = document.getElementById('filter-category');
                    categories.forEach(c => {
                        select.innerHTML += `<option value="${c.id}">${c.name}</option>`;
                    });
                }
            } catch (e) {
                console.error('Failed to load categories:', e);
            }
        }

        async function loadStats() {
            try {
                const token = localStorage.getItem('access_token');
                const res = await fetch('/admin/upload-sessions/stats', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('uploadingCount').textContent = data.uploading;
                    document.getElementById('completedCount').textContent = data.completed;
                    document.getElementById('cancelledCount').textContent = data.cancelled;
                    document.getElementById('totalCount').textContent = data.total;
                }
            } catch (e) {
                console.error('Failed to load stats:', e);
            }
        }

        async function loadSessions() {
            const title = document.getElementById('filter-title').value;
            const author = document.getElementById('filter-author').value;
            const categoryId = document.getElementById('filter-category').value;
            const status = document.getElementById('filter-status').value;
            const token = localStorage.getItem('access_token');

            try {
                let url = `/admin/upload-sessions?page=${currentPage}&size=${pageSize}`;
                if (status) url += `&status=${status}`;

                const res = await fetch(url, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (!res.ok) throw new Error('获取失败');

                const data = await res.json();
                // 客户端筛选
                let sessions = data.sessions;

                if (title) {
                    sessions = sessions.filter(s => s.title && s.title.toLowerCase().includes(title.toLowerCase()));
                }
                if (author) {
                    sessions = sessions.filter(s => s.username && s.username.toLowerCase().includes(author.toLowerCase()));
                }
                if (categoryId) {
                    sessions = sessions.filter(s => s.category_id == categoryId);
                }

                totalSessions = sessions.length;
                renderTable(sessions);
                renderPagination();
            } catch (e) {
                document.getElementById('sessionsTable').innerHTML =
                    `<tr><td colspan="10" style="text-align:center;color:#f04c49;">加载失败: ${e.message}</td></tr>`;
            }
        }

        function applyFilters() {
            currentPage = 1;
            loadSessions();
        }

        function clearFilters() {
            document.getElementById('filter-title').value = '';
            document.getElementById('filter-author').value = '';
            document.getElementById('filter-category').value = '';
            document.getElementById('filter-status').value = '';
            currentPage = 1;
            loadSessions();
        }

        function formatSize(bytes) {
            if (!bytes) return '-';
            const gb = bytes / (1024 * 1024 * 1024);
            if (gb >= 1) return gb.toFixed(2) + ' GB';
            const mb = bytes / (1024 * 1024);
            if (mb >= 1) return mb.toFixed(2) + ' MB';
            return (bytes / 1024).toFixed(2) + ' KB';
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const d = new Date(dateStr);
            return d.toLocaleString('zh-CN');
        }

        function getStatusBadge(status, isStale) {
            if (status === 'uploading' && isStale) {
                return '<span class="status-badge status-paused">已暂停</span>';
            }
            const map = {
                'uploading': '<span class="status-badge status-processing">上传中</span>',
                'completed': '<span class="status-badge status-completed">已完成</span>',
                'cancelled': '<span class="status-badge status-cancelled">已取消</span>'
            };
            return map[status] || `<span class="status-badge">${status}</span>`;
        }

        function renderTable(sessions) {
            const tbody = document.getElementById('sessionsTable');

            if (!sessions || sessions.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;color:#999;">暂无数据</td></tr>';
                document.getElementById('totalCountLabel').textContent = '共 0 条记录';
                return;
            }

            tbody.innerHTML = sessions.map(s => `
                <tr>
                    <td><code>${(s.session_id || s.id || '').slice(0, 8)}...</code></td>
                    <td title="${s.title || ''}">${s.title ? (s.title.length > 15 ? s.title.slice(0, 15) + '...' : s.title) : '-'}</td>
                    <td>${s.category_name || '-'}</td>
                    <td>${s.username || '未知'}</td>
                    <td class="filename" title="${s.filename}">${s.filename || '-'}</td>
                    <td><span class="file-size">${formatSize(s.file_size)}</span></td>
                    <td>
                        <span class="progress-cell ${s.status === 'completed' ? 'completed' : s.status === 'cancelled' ? 'failed' : ''}">
                            ${Math.round(s.progress)}%
                        </span>
                        <span class="file-size">(${s.uploaded_chunks}/${s.total_chunks})</span>
                    </td>
                    <td>${getStatusBadge(s.status, s.is_stale)}</td>
                    <td><span class="file-size">${formatDate(s.created_at)}</span></td>
                    <td>
                        <button class="btn btn-danger btn-small" onclick="cancelSession('${s.session_id || s.id}')">取消</button>
                    </td>
                </tr>
            `).join('');

            document.getElementById('totalCountLabel').textContent = `共 ${totalSessions} 条记录`;
        }

        function renderPagination() {
            const totalPages = Math.ceil(totalSessions / pageSize);
            const pagination = document.getElementById('pagination');

            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }

            pagination.innerHTML = `
                <button ${currentPage === 1 ? 'disabled' : ''} onclick="goPage(${currentPage - 1})">上一页</button>
                <span>第 ${currentPage} / ${totalPages} 页</span>
                <button ${currentPage >= totalPages ? 'disabled' : ''} onclick="goPage(${currentPage + 1})">下一页</button>
            `;
        }

        function goPage(page) {
            currentPage = page;
            loadSessions();
        }

        async function cancelSession(sessionId) {
            if (!confirm('确定要取消该上传会话吗？')) return;

            try {
                const token = localStorage.getItem('access_token');
                const res = await fetch(`/admin/upload-sessions/${sessionId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (!res.ok) throw new Error('取消失败');

                alert('已取消');
                loadStats();
                loadSessions();
            } catch (e) {
                alert('取消失败: ' + e.message);
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', async () => {
            await loadCategories();
            loadStats();
            loadSessions();
        });
    </script>
</body>
</html>

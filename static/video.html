    function initCustomControls() {
        const player = document.getElementById('player');
        const playBtn = document.getElementById('play-btn');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');
        const timeDisplay = document.getElementById('time-display');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const playerWrapper = document.getElementById('player-wrapper');
        const pipBtn = document.getElementById('pip-btn');
        const qualitySelect = document.getElementById('quality-select');
        const volumeBtn = document.getElementById('volume-btn');
        const volumeSlider = document.getElementById('volume-slider');
        const volumeIcon = document.getElementById('volume-icon');
        const volumeMuteIcon = document.getElementById('volume-mute-icon');
        const settingsBtn = document.getElementById('settings-btn');
        const settingsMenu = document.getElementById('settings-menu');

        let lastVolume = 1; // 保存静音前的音量

        // 格式化时间
        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // 更新播放/暂停图标
        function updatePlayIcon() {
            if (player.paused) {
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
            } else {
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
            }
        }

        // 播放/暂停按钮
        playBtn.addEventListener('click', () => {
            if (player.paused) {
                player.play().catch(err => {
                    console.error('Play error:', err.message);
                });
            } else {
                player.pause();
            }
        });

        // 视频点击播放/暂停
        player.addEventListener('click', () => {
            if (player.paused) {
                player.play().catch(err => {
                    console.error('Play error:', err.message);
                });
            } else {
                player.pause();
            }
        });

        // 播放状态变化
        player.addEventListener('play', updatePlayIcon);
        player.addEventListener('pause', updatePlayIcon);

        // 更新进度条和时间
        let lastSaveTime = 0;
        const SAVE_INTERVAL = 5000; // 每5秒保存一次
        player.addEventListener('timeupdate', () => {
            if (!player.duration) return;
            const percent = (player.currentTime / player.duration) * 100;
            progressBar.style.width = percent + '%';
            timeDisplay.textContent = `${formatTime(player.currentTime)} / ${formatTime(player.duration)}`;
            // 节流保存播放位置
            const now = Date.now();
            if (now - lastSaveTime > SAVE_INTERVAL) {
                savePlaybackPosition();
                lastSaveTime = now;
            }
        });

        // 键盘快捷键 - 空格键播放/暂停，左右方向键快进/倒退
        document.addEventListener('keydown', (e) => {
            // 空格键播放/暂停
            if (e.key === ' ') {
                e.preventDefault();
                if (player.paused) {
                    player.play();
                } else {
                    player.pause();
                }
                return;
            }
            if (!player.duration) return;
            const seekAmount = 5; // 秒
            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                player.currentTime = Math.max(0, player.currentTime - seekAmount);
            } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                player.currentTime = Math.min(player.duration, player.currentTime + seekAmount);
            }
        });

        // 进度条拖拽跳转（支持鼠标和触摸）
        let isDragging = false;

        function seekToPosition(clientX) {
            const rect = progressContainer.getBoundingClientRect();
            const percent = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
            player.currentTime = percent * player.duration;
            progressBar.style.width = (percent * 100) + '%';
        }

        // 鼠标事件
        progressContainer.addEventListener('mousedown', (e) => {
            isDragging = true;
            seekToPosition(e.clientX);
            e.preventDefault();
        });

        document.addEventListener('mousemove', (e) => {
            if (isDragging) {
                seekToPosition(e.clientX);
            }
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // 触摸事件
        progressContainer.addEventListener('touchstart', (e) => {
            isDragging = true;
            seekToPosition(e.touches[0].clientX);
            e.preventDefault();
        }, { passive: false });

        document.addEventListener('touchmove', (e) => {
            if (isDragging) {
                seekToPosition(e.touches[0].clientX);
                e.preventDefault();
            }
        }, { passive: false });

        document.addEventListener('touchend', () => {
            isDragging = false;
        });

        // 点击跳转（保留）
        progressContainer.addEventListener('click', (e) => {
            if (!isDragging) {
                seekToPosition(e.clientX);
            }
        });

        // 全屏按钮
        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                playerWrapper.requestFullscreen();
            }
        });

	        // 全屏状态变化处理 - 控件自动隐藏
	        let controlsTimeout;
	        const customControls = document.getElementById('custom-controls');
	        const topControls = document.getElementById('top-controls');
	        document.addEventListener('fullscreenchange', () => {
	            const isFullscreen = !!document.fullscreenElement;
	            if (isFullscreen) {
	                const showControls = () => {
	                    customControls.style.opacity = '1';
	                    topControls.style.opacity = '1';
	                    if (controlsTimeout) clearTimeout(controlsTimeout);
	                    controlsTimeout = setTimeout(() => {
	                        customControls.style.opacity = '0';
	                    }, 3000);
	                };
	                playerWrapper.addEventListener('mousemove', showControls);
	                showControls();
	            } else {
	                customControls.style.opacity = '1';
	                if (controlsTimeout) clearTimeout(controlsTimeout);
	            }
	        });

	        // 画中画按钮
        pipBtn.addEventListener('click', async () => {
            try {
                if (document.pictureInPictureElement) {
                    await document.exitPictureInPicture();
                } else if (document.pictureInPictureEnabled) {
                    await player.requestPictureInPicture();
                }
            } catch(e) {
                console.error('PiP error:', e);
            }
        });

        // 设置菜单
        settingsBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            settingsMenu.classList.toggle('show');
        });

        // 隐藏设置菜单
        document.addEventListener('click', () => {
            settingsMenu.classList.remove('show');
        });

        // 速度选择
        settingsMenu.querySelectorAll('.speed-options .dropdown-item').forEach(item => {
            item.addEventListener('click', (e) => {
                e.stopPropagation();
                const speed = parseFloat(item.dataset.speed);
                player.playbackRate = speed;

                // 更新选中状态
                settingsMenu.querySelectorAll('.speed-options .dropdown-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                settingsMenu.classList.remove('show');
            });
        });

        // 音量控制
        function updateVolumeIcon(volume) {
            if (volume === 0) {
                volumeIcon.style.display = 'none';
                volumeMuteIcon.style.display = 'block';
            } else {
                volumeIcon.style.display = 'block';
                volumeMuteIcon.style.display = 'none';
            }
        }

        volumeSlider.addEventListener('input', (e) => {
            const volume = parseInt(e.target.value) / 100;
            player.volume = volume;
            lastVolume = volume;
            updateVolumeIcon(volume);
        });

        volumeBtn.addEventListener('click', () => {
            if (player.volume > 0) {
                lastVolume = player.volume;
                player.volume = 0;
                volumeSlider.value = 0;
                updateVolumeIcon(0);
            } else {
                player.volume = lastVolume;
                volumeSlider.value = lastVolume * 100;
                updateVolumeIcon(lastVolume);
            }
        });

        // 初始化音量图标
        updateVolumeIcon(player.volume);

        // 分辨率选择（HLS）
        if (qualitySelect) {
            qualitySelect.addEventListener('change', (e) => {
                if (hlsInstance) {
                    hlsInstance.currentLevel = parseInt(e.target.value);
                }
            });
        }

        // 初始化
        player.addEventListener('loadedmetadata', () => {
            timeDisplay.textContent = `0:00 / ${formatTime(player.duration)}`;
            restorePlaybackPosition();
        });

        // 暂停时保存位置
        player.addEventListener('pause', () => {
            savePlaybackPosition();
        });

        // 页面关闭/刷新前保存位置
        window.addEventListener('beforeunload', () => {
            savePlaybackPosition();
        });
    }

    // HLS质量级别设置（供外部调用）
    function setupHlsQuality(hls) {
        hlsInstance = hls;
        const qualitySelect = document.getElementById('quality-select');
        if (!qualitySelect) return;

        const levels = hls.levels;
        if (levels.length > 1) {
            qualitySelect.style.display = 'block';
            qualitySelect.innerHTML = '<option value="-1">自动</option>';
            // 按分辨率从高到低排序
            const sortedLevels = levels.slice().sort((a, b) => b.height - a.height);
            sortedLevels.forEach((level) => {
                const opt = document.createElement('option');
                opt.value = levels.indexOf(level);
                opt.text = level.height + 'p';
                qualitySelect.appendChild(opt);
            });
        }
    }

    // ==================== 字幕功能 ====================
    let availableSubtitles = [];
    let currentSubtitleTrack = null;
    let currentSubtitleLang = null; // 当前选中的字幕语言

    async function loadSubtitles(videoId) {
        try {
            const res = await fetch(`/videos/${videoId}/subtitles`);
            if (res.ok) {
                const subtitles = await res.json();
                availableSubtitles = subtitles;
                setupSubtitleUI(subtitles);
            }
        } catch (e) {
            console.log("No subtitles available");
        }
    }

    function setupSubtitleUI(subtitles) {
        const dropdown = document.getElementById('subtitle-dropdown');
        const menu = document.getElementById('subtitle-menu');
        const btn = document.getElementById('subtitle-btn');

        if (!subtitles || subtitles.length === 0) {
            btn.classList.add('disabled');
            menu.innerHTML = '';
            menu.classList.remove('show');
            return;
        }

        btn.classList.remove('disabled');
        menu.innerHTML = '';

        // Off option
        const offOpt = document.createElement('div');
        offOpt.className = 'dropdown-item' + (currentSubtitleLang === null ? ' active' : '');
        offOpt.textContent = '关闭';
        offOpt.onclick = () => disableSubtitles();
        menu.appendChild(offOpt);

        subtitles.forEach(sub => {
            const opt = document.createElement('div');
            opt.className = 'dropdown-item' + (currentSubtitleLang === sub.language ? ' active' : '');
            opt.textContent = getLanguageName(sub.language) + (sub.is_auto_generated ? ' (自动)' : '');
            opt.onclick = () => enableSubtitle(sub);
            menu.appendChild(opt);
        });
    }

    function getLanguageName(code) {
        // 扩展语言代码映射表
        const names = {
            // 标准 ISO 639-1 代码
            "en": "English", "zh": "中文", "es": "Español", "fr": "Français",
            "de": "Deutsch", "ja": "日本語", "ko": "한국어", "it": "Italiano",
            "pt": "Português", "ru": "Русский", "ar": "العربية", "hi": "हिन्दी",
            "th": "ไทย", "vi": "Tiếng Việt", "id": "Bahasa Indonesia",
            "ms": "Bahasa Melayu", "fil": "Filipino", "nl": "Nederlands",
            "pl": "Polski", "tr": "Türkçe", "uk": "Українська",
            // 中文变体
            "zh-Hans": "简体中文", "zh-Hant": "繁體中文", "zh-CN": "简体中文",
            "zh-TW": "繁體中文", "zh-HK": "繁體中文",
            // 常见英文别名
            "english": "English", "chinese": "中文", "japanese": "日本語",
            "korean": "한국어", "spanish": "Español", "french": "Français",
            "german": "Deutsch", "portuguese": "Português",
            // 常见中文别名
            "英文": "English", "中文": "中文", "日文": "日本語", "韩文": "한국어",
            "法文": "Français", "德文": "Deutsch", "西班牙语": "Español",
        };
        // 转为小写匹配
        const lowerCode = code.toLowerCase();
        return names[lowerCode] || names[code] || code;
    }

    // 字幕状态管理
    let currentSubtitle = null;
    let subtitleCues = [];  // 解析后的字幕条目
    let subtitleUpdateTimer = null;

    function enableSubtitle(sub) {
        const player = document.getElementById('player');

        console.log('[Subtitle] Enabling subtitle:', sub);

        // 禁用 HLS 内嵌字幕
        if (window.hls) {
            window.hls.subtitleTrack = -1;
        }

        // 隐藏所有 textTracks
        for (let i = player.textTracks.length - 1; i >= 0; i--) {
            player.textTracks[i].mode = 'hidden';
        }

        // 清除之前的字幕
        disableSubtitles();

        currentSubtitle = sub;
        currentSubtitleLang = sub.language;

        // 显示字幕覆盖层
        const overlay = document.getElementById('subtitle-overlay');
        if (overlay) overlay.style.display = 'block';

        // 加载并解析字幕文件
        loadSubtitleFile(sub.url);

        // Refresh menu to show active state
        setupSubtitleUI(availableSubtitles);
    }

    function loadSubtitleFile(url) {
        fetch(url)
            .then(res => res.text())
            .then(text => {
                subtitleCues = parseVTT(text);
                console.log('[Subtitle] Loaded', subtitleCues.length, 'cues');
                startSubtitleSync();
            })
            .catch(err => {
                console.error('[Subtitle] Failed to load subtitle file:', err);
            });
    }

    function parseVTT(text) {
        const cues = [];
        const lines = text.split('\n');
        let i = 0;

        // 跳过 WEBVTT 头
        while (i < lines.length && !lines[i].includes('-->')) {
            i++;
        }

        while (i < lines.length) {
            const line = lines[i].trim();
            if (line.includes('-->')) {
                const [start, end] = line.split('-->').map(t => t.trim());
                let text = '';
                i++;
                while (i < lines.length && lines[i].trim() !== '') {
                    text += (text ? '\n' : '') + lines[i].trim();
                    i++;
                }
                if (text) {
                    cues.push({
                        start: parseTimestamp(start),
                        end: parseTimestamp(end),
                        text: text
                    });
                }
            } else {
                i++;
            }
        }
        return cues;
    }

    function parseTimestamp(ts) {
        // 解析 VTT 时间戳 (00:00:00.000 或 00:00.000)
        const parts = ts.split(':');
        let seconds = 0;
        if (parts.length === 3) {
            seconds = parseInt(parts[0]) * 3600 + parseInt(parts[1]) * 60 + parseFloat(parts[2]);
        } else if (parts.length === 2) {
            seconds = parseInt(parts[0]) * 60 + parseFloat(parts[1]);
        }
        return seconds;
    }

    function startSubtitleSync() {
        const player = document.getElementById('player');
        const subtitleText = document.getElementById('subtitle-text');

        if (subtitleUpdateTimer) {
            clearInterval(subtitleUpdateTimer);
        }

        subtitleUpdateTimer = setInterval(() => {
            if (!currentSubtitle || !player) return;

            const currentTime = player.currentTime;
            const cue = subtitleCues.find(c => currentTime >= c.start && currentTime <= c.end);

            if (cue) {
                subtitleText.textContent = cue.text;
            } else {
                subtitleText.textContent = '';
            }
        }, 100);  // 每100ms检查一次
    }

    function disableSubtitles() {
        if (subtitleUpdateTimer) {
            clearInterval(subtitleUpdateTimer);
            subtitleUpdateTimer = null;
        }
        subtitleCues = [];
        currentSubtitle = null;
        currentSubtitleLang = null;

        // 禁用 HLS 字幕
        if (window.hls) {
            window.hls.subtitleTrack = -1;
        }

        // 隐藏字幕覆盖层
        const overlay = document.getElementById('subtitle-overlay');
        if (overlay) overlay.style.display = 'none';

        // 清空字幕文本
        const subtitleText = document.getElementById('subtitle-text');
        if (subtitleText) subtitleText.textContent = '';

        // 隐藏所有 textTracks
        const player = document.getElementById('player');
        if (player) {
            for (let i = player.textTracks.length - 1; i >= 0; i--) {
                player.textTracks[i].mode = 'hidden';
            }
        }

        // Refresh menu to show active state
        if (typeof setupSubtitleUI === 'function') {
            setupSubtitleUI(availableSubtitles);
        }
    }

    // ==================== 播放位置记忆 ====================
    function savePlaybackPosition() {
        const player = document.getElementById('player');
        if (!player || !currentVideoId) return;
        // 不保存太短的位置（开头1秒内）或接近结尾的位置
        // duration 可能为0（HLS），这种情况下跳过保存
        if (!player.duration || player.currentTime < 1 || player.currentTime / player.duration > 0.95) return;
        localStorage.setItem(`video_position_${currentVideoId}`, player.currentTime.toString());
    }

    function restorePlaybackPosition() {
        const player = document.getElementById('player');
        if (!player || !currentVideoId) return;
        const savedTime = localStorage.getItem(`video_position_${currentVideoId}`);
        if (savedTime) {
            const time = parseFloat(savedTime);
            // 验证时间有效（HLS duration 可能还未准备好，浏览器会自动处理无效值）
            if (!isNaN(time) && time > 0) {
                player.currentTime = time;
            }
        }
    }

    // 显示播放错误
    function showPlaybackError(message) {
        const player = document.getElementById('player');
        const playerWrapper = document.getElementById('player-wrapper');
        if (!player || !playerWrapper) return;

        player.style.display = 'none';
        const existingError = document.getElementById('video-error-overlay');
        if (existingError) existingError.remove();

        const errorDiv = document.createElement('div');
        errorDiv.id = 'video-error-overlay';
        errorDiv.style.cssText = 'position:absolute; top:0; left:0; right:0; bottom:0; display:flex; flex-direction:column; justify-content:center; align-items:center; background:#000; color:#666; z-index:10;';
        errorDiv.innerHTML = `<div style="font-size:48px;margin-bottom:20px;">🚫</div><div style="font-size:18px;font-weight:500;margin-bottom:10px;">视频加载失败</div><div style="font-size:14px;color:#999;">${message || '请刷新页面重试'}</div>`;
        playerWrapper.appendChild(errorDiv);
    }

    // Toggle subtitle menu
    document.getElementById('subtitle-btn')?.addEventListener('click', (e) => {
        const btn = document.getElementById('subtitle-btn');
        if (btn.classList.contains('disabled')) return;
        e.stopPropagation();
        document.getElementById('subtitle-menu').classList.toggle('show');
    });

    document.addEventListener('click', () => {
        document.getElementById('subtitle-menu')?.classList.remove('show');
    });

    // ==================== 投屏功能 ====================
    let castDevices = [];

    async function showCastDevices() {
        // 检查登录状态
        const token = localStorage.getItem('access_token');
        if (!token) {
            // 弹出登录界面
            location.href = '/static/login.html?return_url=' + encodeURIComponent(location.href);
            return;
        }

        const list = document.getElementById('device-list');
        list.innerHTML = '<div style="padding:40px; text-align:center;"><div style="display:inline-block; width:32px; height:32px; border:3px solid #eee; border-top:#00a1d6; border-radius:50%; animation:spin 1s linear infinite;"></div><p style="margin-top:12px; color:#666;">搜索投屏设备中...</p></div>';
        document.getElementById('cast-modal').style.display = 'block';

        try {
            const res = await fetch('/api/cast/devices', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.status === 401) {
                closeCastModal();
                location.href = '/static/login.html?return_url=' + encodeURIComponent(location.href);
                return;
            }
            const data = await res.json();
            castDevices = data.devices || [];

            if (castDevices.length === 0) {
                list.innerHTML = '<p style="padding:20px; text-align:center; color:#999;">未发现可投屏设备</p>';
            } else {
                list.innerHTML = castDevices.map(d =>
                    `<div onclick="castTo('${d.id}')" style="padding: 12px; border-bottom: 1px solid #eee; cursor: pointer;">${d.name.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>`
                ).join('');
            }
        } catch(e) {
            console.error('Cast error:', e);
            list.innerHTML = '<p style="padding:20px; text-align:center; color:#f04c49;">获取投屏设备失败</p>';
        }
    }

    async function castTo(deviceId) {
        const token = localStorage.getItem('access_token');
        try {
            const res = await fetch(`/api/cast/play?device_id=${encodeURIComponent(deviceId)}&video_id=${currentVideoId}`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.status === 401) {
                closeCastModal();
                location.href = '/static/login.html?return_url=' + encodeURIComponent(location.href);
                return;
            }
            if (res.ok) {
                alert('投屏成功！');
            } else {
                const err = await res.json();
                alert('投屏失败: ' + (err.detail || '未知错误'));
            }
        } catch(e) {
            console.error('Cast error:', e);
            alert('投屏失败');
        }
        closeCastModal();
    }

    function closeCastModal() {
        document.getElementById('cast-modal').style.display = 'none';
    }

    // 点击模态框外部关闭
    document.addEventListener('click', (e) => {
        const modal = document.getElementById('cast-modal');
        if (modal && e.target === modal) {
            closeCastModal();
        }
    });
</script>

    <div style="background: white; margin: 100px auto; padding: 20px; border-radius: 8px; max-width: 400px;">
        <h3 style="margin: 0 0 16px; font-size: 16px;">选择投屏设备</h3>
        <div id="device-list" style="max-height: 300px; overflow-y: auto;"></div>
        <button onclick="closeCastModal()" style="margin-top: 16px; width: 100%; padding: 10px; border: none; background: #f0f0f0; border-radius: 4px; cursor: pointer;">关闭</button>
    </div>
</div>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>视频详情 - MyVideo</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { font-family: Roboto, Arial, sans-serif; background: #f9f9f9; margin: 0; color: #0f0f0f; }
        /* 导航栏由 nav.js 生成 */
        .container { max-width: 1280px; margin: 0 auto; padding: 24px; display: grid; grid-template-columns: 1fr 400px; gap: 24px; }
        .main-content { grid-column: 1 / 2; }

        /* 播放器 */
        .player-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; margin-bottom: 12px; position: relative; }
        video { width: 100%; height: 100%; }
        .quality-selector { position: absolute; bottom: 10px; right: 10px; z-index: 100; background: rgba(0,0,0,0.7); color: #fff; padding: 5px; border-radius: 4px; font-size: 12px; border:none; outline:none;}

        /* 视频信息 */
        .video-title { font-size: 20px; font-weight: 600; margin: 0 0 10px; line-height: 28px; }
        .video-meta { font-size: 14px; color: #606060; display: flex; align-items: center; gap: 10px; margin-bottom: 12px;}

        .description-box { background: #f2f2f2; padding: 12px; border-radius: 12px; font-size: 14px; line-height: 20px; white-space: pre-wrap; margin-bottom: 24px; color: #0f0f0f;}
        .description-box:hover { background: #e5e5e5; }

        /* 作者栏 */
        .author-card { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid #e5e5e5; }
        .author-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; cursor: pointer; }
        .author-info { flex: 1; }
        .author-name { font-weight: 500; font-size: 16px; cursor: pointer; color: #0f0f0f; text-decoration: none;}
        .author-subs { font-size: 12px; color: #606060; }

        .follow-btn { background: #0f0f0f; color: #fff; border: none; padding: 0 16px; height: 36px; border-radius: 18px; cursor: pointer; font-weight: 500; font-size: 14px; transition: 0.2s; }
        .follow-btn:hover { background: #272727; }
        .follow-btn.following { background: #f2f2f2; color: #0f0f0f; }
        .follow-btn.following:hover { background: #e5e5e5; }

        /* 侧边栏 */
        .sidebar { grid-column: 2 / 3; }
        .rec-item { display: flex; gap: 8px; margin-bottom: 8px; cursor: pointer; }
        .rec-thumb { width: 168px; height: 94px; object-fit: cover; border-radius: 8px; flex-shrink: 0; }
        .rec-info { display: flex; flex-direction: column; gap: 4px; }
        .rec-title { font-size: 14px; font-weight: 500; line-height: 20px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; color: #0f0f0f;}
        .rec-meta { font-size: 12px; color: #606060; }

        /* 评论区样式 (仿 YouTube) */
        .comments-section { margin-top: 24px; }
        .comments-header { font-size: 20px; font-weight: 600; margin-bottom: 24px; display: flex; align-items: center; gap: 8px; }

        .add-comment-row { display: flex; gap: 16px; margin-bottom: 32px; }
        .my-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .input-wrap { flex: 1; }
        .comment-input { width: 100%; border: none; border-bottom: 1px solid #e5e5e5; padding: 8px 0; background: transparent; outline: none; transition: 0.2s; font-size: 14px; }
        .comment-input:focus { border-bottom: 2px solid #0f0f0f; }
        .comment-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 8px; }
        .btn-cancel { background: transparent; border: none; padding: 8px 16px; border-radius: 18px; cursor: pointer; font-weight: 500; color: #0f0f0f; }
        .btn-cancel:hover { background: #f2f2f2; }
        .btn-submit { background: #f2f2f2; color: #909090; border: none; padding: 8px 16px; border-radius: 18px; cursor: not-allowed; font-weight: 500; }
        .btn-submit.active { background: #065fd4; color: #fff; cursor: pointer; }
        .btn-submit.active:hover { background: #0356c3; }

        .comment-item { display: flex; gap: 16px; margin-bottom: 16px; }
        .c-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; cursor: pointer; }
        .c-body { flex: 1; }
        .c-header { margin-bottom: 2px; font-size: 13px; }
        .c-author { font-weight: 500; color: #0f0f0f; text-decoration: none; margin-right: 4px; cursor: pointer;}
        .c-time { color: #606060; }
        .c-content { font-size: 14px; line-height: 20px; color: #0f0f0f; margin-bottom: 4px; white-space: pre-wrap; }
        .c-actions { display: flex; align-items: center; gap: 16px; font-size: 12px; color: #0f0f0f; font-weight: 500; height: 32px;}
        .c-btn { cursor: pointer; padding: 8px 12px; border-radius: 16px; border:none; background:transparent; font-size:12px; font-weight:500; }
        .c-btn:hover { background: #e5e5e5; }
        .c-btn-sm { font-size: 12px; color: #606060; padding: 6px 8px; border-radius: 12px; cursor: pointer; }
        .c-btn-sm:hover { background: #e5e5e5; }

        /* 回复部分 */
        .replies-container { margin-left: 0; }
        /* YouTube的回复虽然视觉上有缩进，但在DOM结构上是独立的块。我们用margin-left模拟 */
        .reply-item { display: flex; gap: 16px; margin-top: 8px; margin-bottom: 8px; }
        .reply-item .c-avatar { width: 24px; height: 24px; } /* 回复头像小一点 */
        .reply-item .c-author { font-size: 13px; }

        .reply-toggle-btn { color: #065fd4; font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; padding: 8px 0; border: none; background: transparent; margin-bottom: 8px; }
        .reply-toggle-btn:hover { background: #def1ff; border-radius: 18px; padding: 8px 12px; margin-left: -12px;}
        .reply-toggle-btn i { font-style: normal; font-size: 16px; transform: rotate(90deg); display: inline-block; }

        .reply-input-box { margin-top: 8px; display: none; margin-bottom: 16px;}

        .deleted-text { font-style: italic; color: #606060; background: #f9f9f9; padding: 4px 8px; border-radius: 4px; display: inline-block;}
    </style>
</head>
<body>
<script src="/static/js/nav.js"></script>

<div class="container">
    <div class="main-content">
        <div class="player-wrapper">
            <video id="player" controls autoplay poster=""></video>
            <select id="quality" class="quality-selector" style="display:none;">
                <option value="-1">Auto</option>
            </select>
        </div>

        <h1 class="video-title" id="title">加载中...</h1>

        <div class="author-card">
            <img id="author-avatar" class="author-avatar">
            <div class="author-info">
                <div id="author-name" class="author-name"></div>
                <div id="author-subs" class="author-subs">0 粉丝</div>
            </div>
            <button id="follow-btn" class="follow-btn" onclick="toggleFollow()">关注</button>
        </div>

        <div class="description-box">
            <div class="video-meta">
                <span id="views" style="color:#0f0f0f; font-weight:500;">0次观看</span>
                <span id="date"></span>
            </div>
            <div id="description"></div>
        </div>

        <!-- 评论区 -->
        <div class="comments-section">
            <div class="comments-header">
                <span id="comment-count">0</span> 条评论
            </div>

            <!-- 添加主评论 -->
            <div class="add-comment-row">
                <img id="my-avatar" src="https://ui-avatars.com/api/?background=random" class="my-avatar">
                <div class="input-wrap">
                    <input type="text" id="main-comment-input" class="comment-input" placeholder="添加评论..." onfocus="showMainActions(true)" oninput="checkInput(this, 'main-submit-btn')">
                    <div class="comment-actions" id="main-actions" style="display:none;">
                        <button class="btn-cancel" onclick="showMainActions(false)">取消</button>
                        <button id="main-submit-btn" class="btn-submit" onclick="postComment(null)">评论</button>
                    </div>
                </div>
            </div>

            <div id="comment-list"></div>
        </div>
    </div>

    <div class="sidebar">
        <div id="rec-list"></div>
    </div>
</div>

<script>
    let currentAuthorId = null;
    let isFollowing = false;
    let currentUser = null;

    document.addEventListener("DOMContentLoaded", async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('id');
        if (!videoId) return location.href = "/static/index.html";

        await loadCurrentUser();
        await loadVideoDetails(videoId);
        await loadRecommendations();
        await loadComments(videoId);
    });

    async function loadCurrentUser() {
        const token = localStorage.getItem("access_token");
        if (!token) return;
        try {
            const res = await fetch("/users/me", { headers: { "Authorization": "Bearer " + token } });
            if (res.ok) {
                currentUser = await res.json();
                const avatar = currentUser.avatar_path || `https://ui-avatars.com/api/?name=${currentUser.username}&background=random`;
                document.getElementById("my-avatar").src = avatar;
            }
        } catch(e) {}
    }

    // --- 评论输入框交互 ---
    function showMainActions(show) {
        const actions = document.getElementById("main-actions");
        const input = document.getElementById("main-comment-input");
        if (show) {
            actions.style.display = "flex";
        } else {
            // Cancel
            input.value = "";
            actions.style.display = "none";
        }
    }

    function checkInput(input, btnId) {
        const btn = document.getElementById(btnId);
        if (input.value.trim().length > 0) {
            btn.classList.add("active");
        } else {
            btn.classList.remove("active");
        }
    }

    function toggleReplyInput(id, rootId, replyToUser) {
        // 关闭其他
        document.querySelectorAll('.reply-input-box').forEach(el => el.style.display = 'none');

        const box = document.getElementById(`reply-box-${id}`);
        if (!box) return; // Should create if not exists? No, pre-rendered

        box.style.display = "block";
        const input = document.getElementById(`reply-input-${id}`);
        input.focus();

        // 如果是回复子评论，自动添加 @Username
        if (replyToUser) {
            input.value = `@${replyToUser} `;
        } else {
            input.value = "";
        }

        // 绑定检查事件
        const btnId = `reply-btn-${id}`;
        checkInput(input, btnId);
        input.oninput = () => checkInput(input, btnId);

        // 存储 rootId 以便提交
        input.dataset.rootId = rootId;
    }

    function cancelReply(id) {
        document.getElementById(`reply-box-${id}`).style.display = "none";
    }

    // --- 加载评论 ---
    async function loadComments(videoId) {
        try {
            const res = await fetch(`/videos/${videoId}/comments`);
            if (res.ok) {
                const comments = await res.json();
                document.getElementById("comment-count").innerText = comments.length; // Approximate
                const list = document.getElementById("comment-list");
                list.innerHTML = "";

                comments.forEach(c => {
                    list.appendChild(createCommentElement(c, null));
                });
            }
        } catch(e) { console.error(e); }
    }

    function createCommentElement(c, rootId) {
        // rootId: 如果为空，说明 c 是主评论，rootId = c.id
        // 如果不为空，说明 c 是回复，但我们这里只渲染主评论列表，所以 c 肯定是主评论
        const isMain = rootId === null;
        const currentRootId = isMain ? c.id : rootId;

        const div = document.createElement("div");
        div.className = isMain ? "comment-item" : "reply-item";
        div.id = `comment-${c.id}`;

        const avatar = c.user.avatar_path || `https://ui-avatars.com/api/?name=${c.user.username}&background=random`;
        const timeAgo = timeSince(new Date(c.created_at));
        const isOwner = currentUser && c.user.username === currentUser.username;

        // 内容处理
        let contentHtml = c.content;
        if (c.is_deleted) {
            contentHtml = `<span class="deleted-text">${c.content}</span>`; // content has replacement text from backend
        }

        // 操作按钮
        let actionsHtml = '';
        if (!c.is_deleted) {
            actionsHtml += `<button class="c-btn" onclick="toggleReplyInput(${c.id}, ${currentRootId}, '${c.user.username}')">回复</button>`;
            if (isOwner) {
                actionsHtml += `<span class="c-btn-sm" onclick="deleteComment(${c.id})">删除</span>`;
            }
        }

        // 回复容器 & 加载更多按钮 (只针对主评论)
        let repliesHtml = '';
        if (isMain && c.reply_count > 0) {
            repliesHtml = `
                <div style="margin-left: 56px;">
                    <button id="toggle-replies-${c.id}" class="reply-toggle-btn" onclick="toggleReplies('${currentRootId}')">
                        <i>&#9662;</i> ${c.reply_count} 条回复
                    </button>
                    <div id="replies-container-${c.id}" class="replies-container" style="display:none;"></div>
                </div>
            `;
        } else if (isMain) {
             repliesHtml = `<div id="replies-container-${c.id}" class="replies-container" style="display:none; margin-left:56px;"></div>`;
        }

        // 嵌入的回复输入框 (默认隐藏)
        const replyInputHtml = `
            <div id="reply-box-${c.id}" class="reply-input-box" style="margin-left: ${isMain?56:0}px;">
                <div class="add-comment-row" style="margin-bottom:0;">
                    <img src="${currentUser ? (currentUser.avatar_path||`https://ui-avatars.com/api/?name=${currentUser.username}`) : 'https://ui-avatars.com/api/?background=random'}" class="my-avatar" style="width:24px; height:24px;">
                    <div class="input-wrap">
                        <input type="text" id="reply-input-${c.id}" class="comment-input" placeholder="添加回复..." style="font-size:13px;">
                        <div class="comment-actions">
                            <button class="btn-cancel" onclick="cancelReply(${c.id})">取消</button>
                            <button id="reply-btn-${c.id}" class="btn-submit" onclick="submitReply(${c.id}, ${currentRootId})">回复</button>
                        </div>
                    </div>
                </div>
            </div>
        `;

        div.innerHTML = `
            <img src="${avatar}" class="c-avatar" onclick="location.href='/static/profile.html?id=${c.user.username}'"> <!-- Assuming username nav for now -->
            <div class="c-body">
                <div class="c-header">
                    <span class="c-author" onclick="location.href='/static/profile.html?id=${c.user.username}'">${c.user.username}</span>
                    <span class="c-time">${timeAgo}</span>
                </div>
                <div class="c-content" id="content-${c.id}">${contentHtml}</div>
                <div class="c-actions">
                    ${actionsHtml}
                </div>
                ${!isMain ? replyInputHtml : ''}
            </div>
        `;

        // 组合：主评论包含回复列表和输入框在底部
        if (isMain) {
            const wrapper = document.createElement("div");
            wrapper.appendChild(div);
            // 主评论的回复框放在 Actions 下面
            const replyBoxContainer = document.createElement("div");
            replyBoxContainer.innerHTML = replyInputHtml;
            div.querySelector(".c-body").appendChild(replyBoxContainer);

            // 回复列表放在最后
            const repliesContainer = document.createElement("div");
            repliesContainer.innerHTML = repliesHtml;
            wrapper.appendChild(repliesContainer);
            return wrapper;
        }

        return div;
    }

    async function toggleReplies(parentId) {
        const container = document.getElementById(`replies-container-${parentId}`);
        const btn = document.getElementById(`toggle-replies-${parentId}`);

        if (container.style.display === "none") {
            // Load
            if (container.children.length === 0) {
                 const urlParams = new URLSearchParams(window.location.search);
                 const videoId = urlParams.get('id');
                 const res = await fetch(`/videos/${videoId}/comments?parent_id=${parentId}`);
                 if (res.ok) {
                     const replies = await res.json();
                     replies.forEach(r => {
                         container.appendChild(createCommentElement(r, parentId));
                     });
                 }
            }
            container.style.display = "block";
            if(btn) btn.innerHTML = `<i>&#9652;</i> 收起回复`;
        } else {
            container.style.display = "none";
            if(btn) {
                // Get count roughly
                const count = container.children.length;
                btn.innerHTML = `<i>&#9662;</i> ${count} 条回复`; // Simplified
            }
        }
    }

    // --- 提交评论/回复 ---
    async function postComment(parentId) {
        let content, input;
        if (parentId === null) {
            input = document.getElementById("main-comment-input");
            content = input.value.trim();
        }

        if (!content) return;
        await sendComment(content, null, input);
    }

    async function submitReply(boxId, rootId) {
        const input = document.getElementById(`reply-input-${boxId}`);
        const content = input.value.trim();
        if (!content) return;

        // 关键：rootId 是主评论ID。无论我们在哪一层回复，parent_id 都设为 rootId
        // 这样后端存为二级结构
        await sendComment(content, rootId, input, () => {
             cancelReply(boxId);
             // 刷新回复列表
             const container = document.getElementById(`replies-container-${rootId}`);
             // 简单的处理：清空并重新展开，或者追加
             // 这里选择追加一个假的或重新加载
             // 为了简单，我们追加到DOM
             // 但我们需要完整的对象。重新加载比较稳妥，或者手动构造
             // 重新加载:
             container.innerHTML = "";
             container.style.display = "none";
             toggleReplies(rootId);
        });
    }

    async function sendComment(content, parentId, inputElem, onSuccess) {
        const token = localStorage.getItem("access_token");
        if (!token) return location.href = "/static/login.html";

        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('id');

        const formData = new FormData();
        formData.append("content", content);
        if (parentId) formData.append("parent_id", parentId);

        try {
            const res = await fetch(`/videos/${videoId}/comments`, {
                method: "POST",
                headers: { "Authorization": "Bearer " + token },
                body: formData
            });

            if (res.ok) {
                inputElem.value = "";
                if (parentId === null) {
                    showMainActions(false);
                    loadComments(videoId); // Reload all for main
                } else {
                    if (onSuccess) onSuccess();
                }
            } else {
                alert("发送失败");
            }
        } catch(e) { console.error(e); }
    }

    async function deleteComment(commentId) {
        if(!confirm("确定删除?")) return;
        const token = localStorage.getItem("access_token");
        try {
            const res = await fetch(`/comments/${commentId}`, {
                method: "DELETE",
                headers: { "Authorization": "Bearer " + token }
            });
            if(res.ok) {
                const el = document.getElementById(`content-${commentId}`);
                if(el) {
                    el.innerHTML = `<span class="deleted-text">该评论已由用户删除</span>`;
                    // Remove actions
                    const actions = el.parentElement.querySelector(".c-actions");
                    if(actions) actions.remove();
                }
            }
        } catch(e) {}
    }

    // --- Helpers ---
    function timeSince(date) {
        const seconds = Math.floor((new Date() - date) / 1000);
        let interval = seconds / 31536000;
        if (interval > 1) return Math.floor(interval) + " 年前";
        interval = seconds / 2592000;
        if (interval > 1) return Math.floor(interval) + " 个月前";
        interval = seconds / 86400;
        if (interval > 1) return Math.floor(interval) + " 天前";
        interval = seconds / 3600;
        if (interval > 1) return Math.floor(interval) + " 小时前";
        interval = seconds / 60;
        if (interval > 1) return Math.floor(interval) + " 分钟前";
        return "刚刚";
    }

    // ... loadVideoDetails (same as before but simplified IDs) ...
    async function loadVideoDetails(id) {
        try {
            const res = await fetch(`/videos/${id}`);
            if (res.ok) {
                const video = await res.json();
                document.title = video.title;
                document.getElementById("title").innerText = video.title;
                document.getElementById("views").innerText = video.views + "次观看";
                document.getElementById("date").innerText = new Date(video.created_at).toLocaleDateString(); // Simple date
                document.getElementById("description").innerText = video.description || "";

                if (video.owner) {
                    currentAuthorId = video.owner.id;
                    document.getElementById("author-name").innerText = video.owner.username;
                    const avatar = video.owner.avatar_path || "https://ui-avatars.com/api/?name=" + video.owner.username;
                    document.getElementById("author-avatar").src = avatar;

                    // Simple subs count placeholder
                    // document.getElementById("author-subs").innerText = "..."

                    checkFollowStatus();
                }

                // Player logic (simplified copy)
                const player = document.getElementById("player");
                player.poster = video.thumbnail_path;
                if (Hls.isSupported() && video.processed_file_path.endsWith('.m3u8')) {
                    const hls = new Hls();
                    hls.loadSource(video.processed_file_path);
                    hls.attachMedia(player);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => player.play());
                } else {
                    player.src = video.processed_file_path;
                }
            }
        } catch(e) {}
    }

    // ... checkFollowStatus, toggleFollow, loadRecommendations (reuse existing logic) ...
    async function checkFollowStatus() {
         const token = localStorage.getItem("access_token");
         if (!token || !currentAuthorId) return;
         const res = await fetch(`/users/${currentAuthorId}/profile`, {headers:{"Authorization":"Bearer "+token}});
         if(res.ok) {
             const data = await res.json();
             isFollowing = data.is_following;
             const btn = document.getElementById("follow-btn");
             if(data.is_self) btn.style.display="none";
             else {
                 btn.innerText = isFollowing ? "已关注" : "关注";
                 btn.className = isFollowing ? "follow-btn following" : "follow-btn";
             }
         }
    }
    async function toggleFollow() {
        const token = localStorage.getItem("access_token");
        if(!token) return location.href="/static/login.html";
        const method = isFollowing ? "DELETE" : "POST";
        const res = await fetch(`/users/${currentAuthorId}/follow`, {method:method, headers:{"Authorization":"Bearer "+token}});
        if(res.ok) { isFollowing = !isFollowing; checkFollowStatus(); }
    }
    async function loadRecommendations() {
        const res = await fetch(`/videos?size=5&sort_by=popular`);
        if(res.ok) {
            const v = await res.json();
            const l = document.getElementById("rec-list");
            v.forEach(i => {
                const d = document.createElement("div");
                d.className = "rec-item";
                d.onclick = () => location.href = `/static/video.html?id=${i.id}`;
                d.innerHTML = `<img src="${i.thumbnail_path}" class="rec-thumb"><div class="rec-info"><div class="rec-title">${i.title}</div><div class="rec-meta">${i.views}次观看</div></div>`;
                l.appendChild(d);
            });
        }
    }
</script>
</body>
</html>

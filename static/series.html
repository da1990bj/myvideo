<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>剧集详情 - MyVideo</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f5f7; color: #333; }
        .container { max-width: 1280px; margin: 0 auto; padding: 24px; display: grid; grid-template-columns: 1fr 400px; gap: 24px; }
        .main-content { grid-column: 1 / 2; }
        .player-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; margin-bottom: 16px; position: relative; }
        .player-wrapper video { width: 100%; height: 100%; }
        .series-title-bar { background: #fff; border-radius: 8px; padding: 16px 20px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
        .series-title-text { font-size: 18px; font-weight: bold; color: #18191c; }
        .series-meta-bar { font-size: 13px; color: #9499a0; }
        .series-meta-bar span { margin-right: 16px; }
        .series-meta-bar .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-right: 8px; }
        .badge.tv { background: #4facfe; color: #fff; }
        .badge.anime { background: #43e97b; color: #fff; }
        .badge.ongoing { background: #ff6b6b; color: #fff; }
        .badge.finished { background: #51cf66; color: #fff; }
        .video-info-section { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
        .video-title { font-size: 20px; font-weight: 600; color: #18191c; margin: 0 0 12px; line-height: 1.4; }
        .video-meta { font-size: 13px; color: #666; margin-bottom: 12px; }
        .video-meta span { margin-right: 16px; }
        .video-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
        .video-tag { background: #f4f5f7; color: #666; padding: 4px 12px; border-radius: 16px; font-size: 12px; }
        .video-actions { display: flex; gap: 12px; padding-top: 12px; border-top: 1px solid #f0f0f0; }
        .action-btn { padding: 8px 20px; border-radius: 4px; font-size: 14px; cursor: pointer; transition: 0.2s; border: none; }
        .action-btn.like { background: #fff0f5; color: #e6507a; border: 1px solid #e6507a; }
        .action-btn.like:hover { background: #ffe6ec; }
        .action-btn.share { background: #f0f9ff; color: #00a1d6; border: 1px solid #00a1d6; }
        .action-btn.share:hover { background: #e0f4ff; }
        .playlist-section { background: #fff; border-radius: 8px; overflow: hidden; }
        .playlist-header { padding: 16px 20px; border-bottom: 1px solid #f0f0f0; font-size: 16px; font-weight: 600; display: flex; align-items: center; justify-content: space-between; }
        .playlist-count { font-size: 13px; color: #9499a0; font-weight: normal; }
        .playlist-item { display: flex; gap: 12px; padding: 12px 20px; cursor: pointer; transition: background 0.2s; }
        .playlist-item:hover { background: #f5f5f5; }
        .playlist-item.active { background: #e7f5ff; }
        .playlist-item.unavailable { opacity: 0.6; cursor: not-allowed; }
        .playlist-thumb { width: 100px; height: 56px; border-radius: 6px; overflow: hidden; flex-shrink: 0; background: #f0f0f0; position: relative; }
        .playlist-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .playlist-thumb .duration { position: absolute; bottom: 4px; right: 4px; background: rgba(0,0,0,0.7); color: #fff; font-size: 11px; padding: 2px 6px; border-radius: 4px; }
        .playlist-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .playlist-title { font-size: 14px; color: #18191c; margin-bottom: 4px; }
        .playlist-meta { font-size: 12px; color: #9499a0; }
        .loading { text-align: center; padding: 60px; color: #999; }
        .empty { text-align: center; padding: 60px; color: #999; }
        .no-video { text-align: center; padding: 40px; color: #999; }
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="main-content">
        <div class="player-wrapper" id="player-wrapper">
            <div class="no-video">点击下方剧集开始播放</div>
        </div>
        <div class="series-title-bar" id="series-title-bar">
            <div>
                <span class="series-title-text" id="series-title">加载中...</span>
            </div>
            <div class="series-meta-bar" id="series-meta"></div>
        </div>
        <div class="video-info-section" id="video-info">
            <h1 class="video-title" id="video-title">选择一个视频开始播放</h1>
            <div class="video-meta" id="video-meta"></div>
            <div class="video-tags" id="video-tags"></div>
            <div class="video-actions">
                <button class="action-btn like" id="like-btn" onclick="toggleLike()">👍 点赞</button>
                <button class="action-btn share" onclick="shareVideo()">📤 分享</button>
            </div>
        </div>
    </div>
    <div class="playlist-section">
        <div class="playlist-header">
            <span id="playlist-title">选集</span>
            <span class="playlist-count" id="playlist-count"></span>
        </div>
        <div class="playlist-items" id="playlist-items">
            <div class="loading">正在加载...</div>
        </div>
    </div>
</div>

<script src="/static/js/series.js"></script>
</body>
</html>

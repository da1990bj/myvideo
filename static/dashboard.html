<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>创作者中心 - MyVideo</title>
    <!-- Socket.IO 客户端库 (v4.x) -->
    <script src="/static/js/socket.io.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f5f7; margin: 0; }
        .container { max-width: 1200px; margin: 20px auto; padding: 20px; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        h1 { margin-top: 0; color: #333; display: flex; justify-content: space-between; align-items: center; }

        /* Stats Dashboard */
        .stats-overview { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #f9f9f9; padding: 20px; border-radius: 8px; border: 1px solid #eee; text-align: center; }
        .stat-card h3 { margin: 0 0 10px; font-size: 14px; color: #666; font-weight: normal; }
        .stat-card .value { font-size: 24px; font-weight: bold; color: #333; }
        .stat-card .icon { width: 28px; height: 28px; margin-bottom: 5px; display: block; color: #666; }
        .stat-card .icon svg { width: 100%; height: 100%; }

        .upload-btn { background: #fb7299; color: #fff; text-decoration: none; padding: 8px 20px; border-radius: 4px; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        th { background: #fafafa; color: #666; font-weight: 500; }
        .video-cell { display: flex; gap: 12px; align-items: center; }
        .thumb { width: 100px; height: 56px; object-fit: cover; border-radius: 4px; background: #eee; }
        .video-info h4 { margin: 0 0 4px; font-size: 14px; color: #333; }
        .status-badge { font-size: 12px; padding: 2px 6px; border-radius: 4px; background: #eee; color: #666; }
        .status-completed { background: #e7f5ff; color: #00a1d6; }
        .action-btn { cursor: pointer; color: #00a1d6; margin-right: 10px; background: none; border: none; font-size: 14px; }
        .action-btn.delete { color: #ff4d4f; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: #fff; padding: 30px; border-radius: 8px; width: 500px; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .modal-actions { text-align: right; margin-top: 20px; }
        .refresh-indicator { font-size: 12px; color: #999; margin-left: 10px; opacity: 0; transition: opacity 0.5s; }
        .refresh-indicator.show { opacity: 1; }
        
        /* 标签组件样式 */
        .tags-container { display: flex; flex-wrap: wrap; gap: 8px; padding: 8px; border: 1px solid #ddd; border-radius: 4px; background: #fff; min-height: 42px; cursor: text; }
        .tags-container:focus-within { border-color: #00a1d6; }
        .tag-chip { background: #e7f5ff; color: #00a1d6; padding: 4px 10px; border-radius: 16px; font-size: 13px; display: flex; align-items: center; gap: 6px; user-select: none; }
        .tag-chip .remove { cursor: pointer; font-weight: bold; opacity: 0.6; }
        .tag-chip .remove:hover { opacity: 1; }
        .tag-input { border: none !important; outline: none !important; padding: 4px !important; flex: 1; min-width: 60px; background: transparent; }
    </style>
</head>
<body>
<script src="/static/js/nav.js"></script>

<div class="container">
    <div class="stats-overview">
        <div class="stat-card">
            <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg></span>
            <h3>总播放量</h3>
            <div class="value" id="total-views">...</div>
        </div>
        <div class="stat-card">
            <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path></svg></span>
            <h3>获赞总数</h3>
            <div class="value" id="total-likes">...</div>
        </div>
        <div class="stat-card">
            <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 6.82 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg></span>
            <h3>获藏总数</h3>
            <div class="value" id="total-favs">...</div>
        </div>
    </div>

    <h1 style="display:flex; justify-content:space-between; align-items:center;">
        <span>内容管理 <span id="refresh-hint" class="refresh-indicator">自动刷新中...</span></span>
        <div style="display:flex; gap:10px;">
             <button id="tab-btn-videos" class="upload-btn" onclick="switchTab('videos')" style="background:#00a1d6;">我的视频</button>
             <button id="tab-btn-collections" class="upload-btn" onclick="switchTab('collections')" style="background:#fff; color:#666; border:1px solid #ddd;">我的合集</button>
             <button id="tab-btn-uploads" class="upload-btn" onclick="switchTab('uploads')" style="background:#fff; color:#666; border:1px solid #ddd;">上传管理</button>
             <a href="/static/upload.html" class="upload-btn" style="background:#fb7299;">投稿</a>
        </div>
    </h1>

    <!-- Videos Tab -->
    <div id="tab-videos">
        <table>
            <thead>
                <tr>
                    <th width="40%">视频信息</th>
                    <th>数据 (播放/完播)</th>
                    <th>状态</th>
                    <th>时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="video-list">
                <tr><td colspan="5" style="text-align:center;">加载中...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Collections Tab -->
    <div id="tab-collections" style="display:none;">
        <div style="text-align:right; margin:10px 0;">
            <button class="upload-btn" onclick="openCollectionModal()" style="background:#2f9e44;">+ 新建合集</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th width="50%">合集信息</th>
                    <th>视频数</th>
                    <th>创建时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="collection-list">
                <tr><td colspan="4" style="text-align:center;">加载中...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Uploads Tab -->
    <div id="tab-uploads" style="display:none;">
        <input type="file" id="resumeFileInput" accept="video/*" style="display:none;" onchange="handleResumeFileSelect(event)">
        <input type="hidden" id="resumeSessionId">
        <table>
            <thead>
                <tr>
                    <th width="35%">文件信息</th>
                    <th>分片进度</th>
                    <th>上传状态</th>
                    <th>创建时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="upload-list">
                <tr><td colspan="5" style="text-align:center;">加载中...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Collection Modal -->
<div id="collectionModal" class="modal">
    <div class="modal-content">
        <h2 id="colModalTitle">创建合集</h2>
        <form id="collectionForm" onsubmit="handleCollectionSubmit(event)">
            <input type="hidden" id="colId">
            <div class="form-group">
                <label>合集标题</label>
                <input type="text" id="colTitle" required placeholder="例如：Python教程系列">
            </div>
            <div class="form-group">
                <label>简介描述</label>
                <textarea id="colDesc" rows="3" placeholder="介绍一下这个合集..."></textarea>
            </div>
            <div class="modal-actions">
                <button type="button" onclick="document.getElementById('collectionModal').style.display='none'" style="padding:8px 16px; margin-right:10px; background:#eee; border:none; border-radius:4px; cursor:pointer;">取消</button>
                <button type="submit" style="padding:8px 16px; background:#00a1d6; color:#fff; border:none; border-radius:4px; cursor:pointer;">保存</button>
            </div>
        </form>
    </div>
</div>


<!-- 编辑弹窗 -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <h2>编辑视频</h2>
        <form id="editForm" onsubmit="handleUpdate(event)">
            <input type="hidden" id="editId">
            <div class="form-group">
                <label>标题</label>
                <input type="text" id="editTitle" required>
            </div>
            
            <div class="form-group">
                <label>封面设置</label>
                <div style="display:flex; gap:10px; align-items:center;">
                    <img id="editThumbPreview" src="" style="width:80px; height:45px; object-fit:cover; border:1px solid #eee; background:#f0f0f0;">
                    <button type="button" class="action-btn" onclick="regenerateThumb()">🎲 随机生成</button>
                    <button type="button" class="action-btn" onclick="document.getElementById('thumbInput').click()">📁 上传封面</button>
                    <input type="file" id="thumbInput" accept="image/*" style="display:none;" onchange="uploadThumb()">
                </div>
            </div>

            <div style="display:flex; gap:15px;">
                <div class="form-group" style="flex:1;">
                    <label>分类</label>
                    <select id="editCategory"></select>
                </div>
                <div class="form-group" style="width:120px;">
                    <label>可见性</label>
                    <select id="editVisibility">
                        <option value="public">公开</option>
                        <option value="private">仅自己可见</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label>标签 (Tags)</label>
                <div class="tags-container" onclick="document.getElementById('tagInput').focus()">
                    <!-- 动态标签插入这里 -->
                    <input type="text" id="tagInput" class="tag-input" placeholder="输入标签，按空格生成">
                </div>
            </div>

            <div class="modal-actions">
                <button type="button" onclick="closeModal()" style="padding:8px 16px; margin-right:10px; background:#eee; border:none; border-radius:4px; cursor:pointer;">取消</button>
                <button type="submit" style="padding:8px 16px; background:#00a1d6; color:#fff; border:none; border-radius:4px; cursor:pointer;">保存</button>
            </div>
        </form>
    </div>
</div>

<script>
    let refreshTimer = null;
    let categories = [];
    let currentTags = []; 
    const colors = ['#e7f5ff', '#fff0f6', '#ebfbee', '#fff9db', '#f3f0ff'];
    const textColors = ['#00a1d6', '#c2255c', '#2f9e44', '#f08c00', '#7950f2'];

    let currentTab = 'videos';
    let socket;
    const videoStateMap = {};  // 缓存视频状态 {video_id: {progress, status}}
    const uploadStateMap = {};  // 缓存上传状态 {session_id: {progress, uploaded_chunks, total_chunks}}

    /**
     * 初始化 WebSocket 连接
     */
    function initWebSocket() {
        const token = localStorage.getItem("access_token");

        const socketOptions = {
            auth: { token: token },
            reconnection: true,
            reconnectionDelay: 1000,
            reconnectionDelayMax: 5000,
            reconnectionAttempts: 10,
            transports: ['websocket', 'polling']
        };

        console.log('Initializing WebSocket connection via Nginx proxy...');

        try {
            socket = io('/', socketOptions);

            socket.on('connect', () => {
                console.log('✅ WebSocket connected (dashboard):', socket.id);
                // 停止轮询
                if (refreshTimer) {
                    clearInterval(refreshTimer);
                    refreshTimer = null;
                }
            });

            socket.on('transcode_progress', (data) => {
                onTranscodeProgress(data);
            });

            socket.on('upload_progress', (data) => {
                onUploadProgress(data);
            });

            socket.on('upload_complete', (data) => {
                onUploadComplete(data);
            });

            socket.on('disconnect', (reason) => {
                console.log('WebSocket disconnected (dashboard):', reason);
                // 启用轮询作为降级
                if (!refreshTimer) {
                    refreshTimer = setInterval(() => loadMyVideos(true), 5000);
                }
            });

            socket.on('error', (error) => {
                console.error('WebSocket error:', error);
            });

            socket.on('connect_error', (error) => {
                console.error('WebSocket connect_error:', error);
            });

        } catch (e) {
            console.error('Failed to initialize WebSocket:', e);
            // Fallback: 启用轮询
            if (!refreshTimer) {
                refreshTimer = setInterval(() => loadMyVideos(true), 5000);
            }
        }
    }

    /**
     * 处理转码进度更新
     */
    function onTranscodeProgress(data) {
        const { video_id, progress, status } = data;
        videoStateMap[video_id] = { progress, status };

        // 只有视频列表标签处于活跃时才更新UI
        if (currentTab === 'videos') {
            const row = document.querySelector(`tr[data-video-id="${video_id}"]`);
            if (row) {
                const statusCell = row.querySelector('td:nth-child(3)');

                if (status === "processing") {
                    const progressHtml = "<div style='font-size:12px; color:#00a1d6;'>转码中 " + progress + "%</div>" +
                                        "<div style='width:100px; height:4px; background:#eee; border-radius:2px; margin-top:4px;'>" +
                                        "<div style='width:" + progress + "%; height:100%; background:#00a1d6; border-radius:2px;'></div></div>";
                    statusCell.innerHTML = progressHtml;
                } else if (status === "completed") {
                    statusCell.innerHTML = "<span class='status-badge status-completed'>已发布</span>";
                } else if (status === "failed") {
                    statusCell.innerHTML = "<span class='status-badge' style='color:red; background:#ffe6e6;'>处理失败</span>";
                }
            }
        }
    }

    /**
     * 处理上传进度更新
     */
    function onUploadProgress(data) {
        const { session_id, progress, uploaded_chunks, total_chunks } = data;
        uploadStateMap[session_id] = { progress, uploaded_chunks, total_chunks };

        if (currentTab === 'uploads') {
            renderUploadSessions();
        }
    }

    /**
     * 处理上传完成事件
     */
    function onUploadComplete(data) {
        const { session_id, video_id } = data;
        delete uploadStateMap[session_id];

        if (currentTab === 'uploads') {
            loadUploadSessions();
        }

        // 如果在视频标签页，也刷新视频列表
        if (currentTab === 'videos') {
            loadMyVideos(true);
        }
    }

    /**
     * 加载上传会话列表
     */
    async function loadUploadSessions() {
        const token = localStorage.getItem("access_token");
        try {
            const res = await fetch("/upload-sessions", {
                headers: { "Authorization": "Bearer " + token }
            });
            if (res.ok) {
                const sessions = await res.json();
                sessions.forEach(s => {
                    uploadStateMap[s.session_id] = {
                        progress: s.progress,
                        uploaded_chunks: s.uploaded_chunks,
                        total_chunks: s.total_chunks
                    };
                });
                renderUploadSessions(sessions);
            }
        } catch(e) { console.error(e); }
    }

    /**
     * 渲染上传会话列表
     */
    function renderUploadSessions(sessions) {
        const tbody = document.getElementById("upload-list");
        if (!tbody) return;

        if (!sessions || sessions.length === 0) {
            tbody.innerHTML = "<tr><td colspan='5' style='text-align:center; padding:40px;'>暂无正在上传的文件</td></tr>";
            return;
        }

        let html = "";
        sessions.forEach(s => {
            const state = uploadStateMap[s.session_id] || {};
            const progress = state.progress || s.progress || 0;
            const uploaded = state.uploaded_chunks || s.uploaded_chunks || 0;
            const total = state.total_chunks || s.total_chunks || 0;

            html += `<tr data-upload-session="${s.session_id}">` +
                "<td><div style='font-weight:500;'>" + s.title + "</div>" +
                "<div style='font-size:12px; color:#999;'>" + s.filename + " (" + formatSize(s.file_size) + ")</div></td>" +
                "<td>" + uploaded + " / " + total + " 分片</td>" +
                "<td><div style='font-size:12px; color:#00a1d6;'>上传中 " + Math.round(progress) + "%</div>" +
                "<div style='width:120px; height:4px; background:#eee; border-radius:2px; margin-top:4px;'>" +
                `<div id="resume-progress-${s.session_id}" style="width:` + progress + `%; height:100%; background:#00a1d6; border-radius:2px;"></div></div></td>` +
                "<td>" + new Date(s.created_at).toLocaleString() + "</td>" +
                "<td>" +
                "<button class='action-btn' onclick='triggerResumeUpload(\"" + s.session_id + "\")' style='margin-right:5px;'>继续上传</button>" +
                "<button class='action-btn' onclick='cancelUploadSession(\"" + s.session_id + "\")' style='color:#f04c49;'>取消</button>" +
                "</td>" +
                "</tr>";
        });
        tbody.innerHTML = html;
    }

    // 触发恢复上传 - 弹出文件选择
    function triggerResumeUpload(sessionId) {
        document.getElementById('resumeSessionId').value = sessionId;
        document.getElementById('resumeFileInput').click();
    }

    // 取消上传会话
    async function cancelUploadSession(sessionId) {
        if (!confirm('确定要取消上传吗？\n\n注意：取消后将删除已上传的分片数据，需要重新上传整个文件。')) return;

        const token = localStorage.getItem("access_token");
        try {
            const res = await fetch(`/upload-sessions/${sessionId}`, {
                method: 'DELETE',
                headers: { "Authorization": "Bearer " + token }
            });
            if (res.ok) {
                // 从列表移除
                delete uploadStateMap[sessionId];
                // 清理 localStorage
                const pending = JSON.parse(localStorage.getItem('pendingUploadSessions') || '{}');
                delete pending[sessionId];
                localStorage.setItem('pendingUploadSessions', JSON.stringify(pending));
                loadUploadSessions();
            } else {
                const err = await res.json();
                alert('取消失败: ' + (err.detail || '未知错误'));
            }
        } catch (e) {
            console.error('Cancel failed:', e);
            alert('取消失败，请重试');
        }
    }

    // 处理恢复上传的文件选择
    async function handleResumeFileSelect(event) {
        const file = event.target.files[0];
        if (!file) return;

        const sessionId = document.getElementById('resumeSessionId').value;
        const token = localStorage.getItem("access_token");

        // 更新状态显示
        const row = document.querySelector(`tr[data-upload-session="${sessionId}"]`);
        const CHUNK_SIZE = 5 * 1024 * 1024;

        const updateProgress = (uploaded, total) => {
            const pct = Math.round(uploaded / total * 100);
            const progressBar = document.getElementById(`resume-progress-${sessionId}`);
            if (progressBar) progressBar.style.width = pct + '%';
            const statusText = document.getElementById(`resume-status-${sessionId}`);
            if (statusText) statusText.innerText = `上传中 ${pct}% (${uploaded}/${total} 分片)`;
        };

        try {
            // 获取会话详情
            const sessionRes = await fetch(`/upload-sessions/${sessionId}`, {
                headers: { "Authorization": "Bearer " + token }
            });
            if (!sessionRes.ok) throw new Error('获取会话失败');

            const sessionData = await sessionRes.json();

            // 检查文件名是否匹配
            if (sessionData.filename !== file.name) {
                alert('请选择相同的文件: ' + sessionData.filename);
                return;
            }

            // 已上传的分片
            let uploadedChunks = sessionData.uploaded_chunk_indexes || [];
            const totalChunks = sessionData.total_chunks;

            // 更新状态显示
            if (row) {
                const statusCell = row.querySelector('td:nth-child(3)');
                statusCell.innerHTML =
                    `<div id="resume-status-${sessionId}" style="font-size:12px; color:#00a1d6;">准备恢复 (${uploadedChunks.length}/${totalChunks})...</div>` +
                    `<div style="width:120px; height:4px; background:#eee; border-radius:2px; margin-top:4px;">` +
                    `<div id="resume-progress-${sessionId}" style="width:${Math.round(uploadedChunks.length/totalChunks*100)}%; height:100%; background:#00a1d6; border-radius:2px;"></div></div>`;

                // 更新按钮为上传中状态
                const actionCell = row.querySelector('td:nth-child(5)');
                actionCell.innerHTML =
                    `<button class='action-btn' disabled style='margin-right:5px; opacity:0.6;'>上传中...</button>` +
                    `<button class='action-btn' onclick='cancelUploadSession("${sessionId}")' style='color:#f04c49;'>取消</button>`;
            }

            // 上传缺失的分片
            for (let i = uploadedChunks.length; i < totalChunks; i++) {
                const start = i * CHUNK_SIZE;
                const end = Math.min(start + CHUNK_SIZE, file.size);
                const chunk = file.slice(start, end);

                const formData = new FormData();
                formData.append("chunk", chunk);

                const chunkRes = await fetch(`/upload-sessions/${sessionId}/chunks/${i}`, {
                    method: "POST",
                    headers: { "Authorization": "Bearer " + token },
                    body: formData
                });

                if (!chunkRes.ok) throw new Error(`分片 ${i + 1} 上传失败`);

                const chunkData = await chunkRes.json();
                uploadedChunks = chunkData.uploaded_chunks; // 更新已上传分片数
                updateProgress(uploadedChunks, totalChunks);
            }

            // 完成上传
            const completeRes = await fetch(`/upload-sessions/${sessionId}/complete`, {
                method: "POST",
                headers: { "Authorization": "Bearer " + token }
            });

            if (completeRes.ok) {
                // 从列表移除（上传完成不再是进行中的会话）
                loadUploadSessions();
            } else {
                const err = await completeRes.json();
                throw new Error(err.detail || '完成上传失败');
            }

        } catch (e) {
            console.error('Resume upload failed:', e);
            alert('恢复上传失败: ' + e.message);
            loadUploadSessions();
        }
    }

    function formatSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        if (bytes < 1024 * 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + ' MB';
        return (bytes / 1024 / 1024 / 1024).toFixed(2) + ' GB';
    }

    document.addEventListener("DOMContentLoaded", async () => {
        const token = localStorage.getItem("access_token");
        if (!token) location.href = "/static/login.html";

        // 初始化 WebSocket 连接
        initWebSocket();

        loadStats();
        await loadCategories();

    async function loadMyCollections() {
        const token = localStorage.getItem("access_token");
        try {
            const res = await fetch("/collections?user_id=" + parseJwt(token).sub, { // Need to resolve username to ID or backend supports "me"
                 // Actually backend /collections takes user_id. But "me" logic is better.
                 // Backend: get_collections(user_id=...). If I pass nothing, it lists all? No, existing code:
                 // if user_id: filter.
                 // So I need to pass my user_id.
            });
            // Wait, /collections expects user_id param to filter by user. If not provided, it returns all?
            // Let's check backend code again.
            // Yes.

            // To be safe, let's use /users/me to get ID first or use a new endpoint /users/me/collections.
            // I'll use /users/me first.
            const userRes = await fetch("/users/me", { headers: { "Authorization": "Bearer " + token } });
            const user = await userRes.json();

            const res2 = await fetch("/collections?user_id=" + user.id, {
                headers: { "Authorization": "Bearer " + token }
            });

            if (res2.ok) {
                const cols = await res2.json();
                renderCollections(cols);
            }
        } catch (e) { console.error(e); }
    }

    function parseJwt (token) {
        var base64Url = token.split('.')[1];
        var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        return JSON.parse(jsonPayload);
    }

    async function loadMyVideos(skipPolling = false) {
        const token = localStorage.getItem("access_token");
        try {
            // 只在手动刷新或轮询时显示提示
            if (!skipPolling) {
                document.getElementById("refresh-hint").classList.add("show");
            }

            const res = await fetch("/users/me/videos", {
                headers: { "Authorization": "Bearer " + token }
            });

            if (!skipPolling) {
                setTimeout(() => document.getElementById("refresh-hint").classList.remove("show"), 500);
            }

            if (res.ok) {
                const videos = await res.json();
                renderTable(videos);

                // 加载队列信息
                videos.forEach(v => {
                    if (v.status === "pending" || v.status === "processing") {
                        loadQueueInfo(v.id);
                    }
                });

                // 仅在WebSocket未连接时启用轮询
                if (!socket || !socket.connected) {
                    const hasProcessing = videos.some(v => v.status === "processing" || v.status === "pending");
                    if (hasProcessing && !refreshTimer) {
                        // 有处理中的视频且没有定时器，启动轮询
                        refreshTimer = setInterval(() => loadMyVideos(true), 5000);
                    } else if (!hasProcessing && refreshTimer) {
                        // 没有处理中的视频，停止轮询
                        clearInterval(refreshTimer);
                        refreshTimer = null;
                    }
                } else if (refreshTimer) {
                    // WebSocket已连接，停止轮询
                    clearInterval(refreshTimer);
                    refreshTimer = null;
                }
            }
        } catch (e) { console.error(e); }
    }

    function renderTable(videos) {
        const tbody = document.getElementById("video-list");
        if (videos.length === 0) {
            tbody.innerHTML = "<tr><td colspan='5' style='text-align:center; padding:40px;'>暂无稿件</td></tr>";
            return;
        }

        let html = "";
        videos.forEach(v => {
            const statusClass = v.status === "completed" ? "status-completed" : "";
            const rate = v.views > 0 ? Math.round((v.complete_views / v.views) * 100) + "%" : "0%";

            // 优先使用 WebSocket 推送的进度
            const progress = videoStateMap[v.id]?.progress || v.progress || 0;
            const status = videoStateMap[v.id]?.status || v.status;

            let statusHtml = "";
            if (status === "processing") {
                statusHtml = "<div style='font-size:12px; color:#00a1d6;'>转码中 " + progress + "%</div>" +
                             "<div style='width:100px; height:4px; background:#eee; border-radius:2px; margin-top:4px;'>" +
                             "<div style='width:" + progress + "%; height:100%; background:#00a1d6; border-radius:2px;'></div></div>";
            } else if (status === "failed") {
                statusHtml = "<span class='status-badge' style='color:red; background:#ffe6e6;'>处理失败</span>";
            } else if (status === "pending") {
                statusHtml = `<span class='status-badge'>等待处理</span><div style='font-size:11px; color:#888; margin-top:2px;' id='queue-info-${v.id}'>加载中...</div>`;
            } else if (status === "banned") {
                statusHtml = `<span class='status-badge' style='color:white; background:#f04c49;' title='原因: ${v.ban_reason || "未知"}'>已下架</span><div style="font-size:12px; color:#f04c49; margin-top:4px;">${v.ban_reason || ""}</div>`;
            } else if (status === "appealing") {
                statusHtml = "<span class='status-badge' style='color:#f08c00; background:#fff9db;'>申诉中</span>";
            } else {
                statusHtml = "<span class='status-badge " + statusClass + "'>已发布</span>";
            }

            // 安全处理 tags
            const tagArray = Array.isArray(v.tags) ? v.tags : [];
            const tagsStr = tagArray.join(",").replace(/"/g, "&quot;");
            const titleSafe = v.title.replace(/"/g, "&quot;");

            let buttons = `<button class='action-btn' onclick='openEdit("${v.id}", "${titleSafe}", "${v.visibility}", "${(v.category ? v.category.id : "")}", "${tagsStr}", "${(v.thumbnail_path || "")}")'>编辑</button>`;

            if (status === "banned") {
                buttons += `<button class='action-btn' style='color:#f08c00;' onclick='appealVideo("${v.id}")'>申诉</button>`;
            } else if (status === "failed") {
                buttons += `<button class='action-btn' style='color:#00a1d6;' onclick='retryVideo("${v.id}")'>重试</button>`;
            } else if (status === "pending") {
                buttons += `<button class='action-btn' style='color:#9c27b0;' onclick='bumpVideo("${v.id}")'>付费插队</button>`;
            }

            buttons += `<button class='action-btn delete' onclick='deleteVideo("${v.id}")'>删除</button>`;

            html += "<tr data-video-id='" + v.id + "'>" +
                "<td><div class='video-cell'>" +
                "<img src='" + (v.thumbnail_path || "/static/default_thumb.jpg") + "' class='thumb'>" +
                "<div class='video-info'>" +
                "<h4><a href='/static/video.html?id=" + v.id + "' target='_blank'>" + v.title + "</a></h4>" +
                "<span style='font-size:12px; color:#999;'>" + (v.visibility === "private" ? "🔒 私密" : "🌍 公开") + "</span>" +
                "</div></div></td>" +
                "<td><div>" + v.views + " 播放 / " + v.complete_views + " 完播</div>" +
                "<div style='font-size:12px; color:#999;'>完播率: " + rate + "</div></td>" +
                "<td>" + statusHtml + "</td>" +
                "<td>" + new Date(v.created_at).toLocaleDateString() + "</td>" +
                "<td>" + buttons + "</td>" +
                "</tr>";
        });
        tbody.innerHTML = html;
    }

                method: "POST",

                headers: { "Authorization": "Bearer " + token }

            if (res.ok) {

    async function loadQueueInfo(videoId) {
        const token = localStorage.getItem("access_token");
        try {
            const res = await fetch(`/videos/${videoId}/queue_info`, {
                headers: { "Authorization": "Bearer " + token }
            });
            if (res.ok) {
                const data = await res.json();

                    }
                }
            }

    async function bumpVideo(id) {
        if (!confirm("确定要付费插队吗？将消耗5积分。")) return;

    function openEdit(id, title, visibility, categoryId, tagsStr, thumbPath) {

        if(categoryId) document.getElementById("editCategory").value = categoryId;
        
        // 恢复标签 (稳健解析)
        currentTags = tagsStr ? tagsStr.split(",").filter(t => t) : [];

        document.getElementById("editThumbPreview").src = thumbPath || "/static/default_thumb.jpg";
        document.getElementById("editModal").style.display = "flex";
    }

    // --- 标签逻辑 ---
    function initTagInput() {
        const input = document.getElementById("tagInput");
        input.addEventListener("keydown", (e) => {
            if (e.key === "Enter" || e.key === " ") {
                e.preventDefault();
                const val = input.value.trim();

                // 限制检查
                if (currentTags.length >= 5) {
                    alert("最多只能添加 5 个标签");
                    return;
                }
                if (val.length > 20) {
                    alert("单个标签不能超过 20 个字符");
                    return;
                }
                // 正则检查: 中文、字母、数字、下划线、空格、横杠、点、加号、井号
                if (!/^[\w\u4e00-\u9fa5\s\-\.\+\#]+$/.test(val)) {
                    alert("标签包含非法字符 (仅允许中文、字母、数字、下划线、空格、横杠、点、加号、井号)");
                    return;
                }

                if (val && !currentTags.includes(val)) {
                    currentTags.push(val);
                    renderTags();
                }
                input.value = "";
            } else if (e.key === "Backspace" && input.value === "" && currentTags.length > 0) {
                currentTags.pop();
                renderTags();
            }
        });
    }

    function renderTags() {
        const container = document.querySelector(".tags-container");
        const input = document.getElementById("tagInput");

        Array.from(container.children).forEach(child => {
            if (child !== input) container.removeChild(child);
        });

        currentTags.forEach((tag, index) => {
            const chip = document.createElement("div");
            chip.className = "tag-chip";
            chip.innerHTML = tag + ' <span class="remove" onclick="removeTag(' + index + ')">×</span>';
            const colorIdx = index % colors.length;
            chip.style.backgroundColor = colors[colorIdx];
            chip.style.color = textColors[colorIdx];
            container.insertBefore(chip, input);
        });

        // 数量达到上限时禁用输入
        if (currentTags.length >= 5) {
            input.disabled = true;
            input.placeholder = "已达标签上限 (5/5)";
        } else {
            input.disabled = false;
            input.placeholder = "输入标签，按空格生成";
            input.focus();
        }
    }
    
    window.removeTag = function(index) {
        currentTags.splice(index, 1);
        renderTags();
    }

    async function uploadThumb() {
        const id = document.getElementById("editId").value;
        const file = document.getElementById("thumbInput").files[0];
        if(!file) return;

        const formData = new FormData();
        formData.append("file", file);
        const token = localStorage.getItem("access_token");

        try {
            const res = await fetch("/videos/" + id + "/thumbnail/upload", {
                method: "POST",
                headers: { "Authorization": "Bearer " + token },
                body: formData
            });
            if(res.ok) {
                const data = await res.json();
                document.getElementById("editThumbPreview").src = data.thumbnail_path;
            } else {
                alert("上传失败");
            }
        } catch(e) { alert("网络错误"); }
    }

    async function deleteVideo(id) {
        if (!confirm("确定要删除这个视频吗？操作不可恢复！")) return;
        const token = localStorage.getItem("access_token");
        try {
            const res = await fetch("/videos/" + id, {
                method: "DELETE",
                headers: { "Authorization": "Bearer " + token }
            });
            if (res.ok) {
                loadMyVideos();
            } else {
                alert("删除失败");
            }
        } catch(e) { alert("网络错误"); }
    }

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>创作者中心 - MyVideo</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f5f7; margin: 0; }
        .container { max-width: 1200px; margin: 20px auto; padding: 20px; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        h1 { margin-top: 0; color: #333; display: flex; justify-content: space-between; align-items: center; }
        .upload-btn { background: #fb7299; color: #fff; text-decoration: none; padding: 8px 20px; border-radius: 4px; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        th { background: #fafafa; color: #666; font-weight: 500; }
        .video-cell { display: flex; gap: 12px; align-items: center; }
        .thumb { width: 100px; height: 56px; object-fit: cover; border-radius: 4px; background: #eee; }
        .video-info h4 { margin: 0 0 4px; font-size: 14px; color: #333; }
        .status-badge { font-size: 12px; padding: 2px 6px; border-radius: 4px; background: #eee; color: #666; }
        .status-completed { background: #e7f5ff; color: #00a1d6; }
        .action-btn { cursor: pointer; color: #00a1d6; margin-right: 10px; background: none; border: none; font-size: 14px; }
        .action-btn.delete { color: #ff4d4f; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: #fff; padding: 30px; border-radius: 8px; width: 500px; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .modal-actions { text-align: right; margin-top: 20px; }
        .refresh-indicator { font-size: 12px; color: #999; margin-left: 10px; opacity: 0; transition: opacity 0.5s; }
        .refresh-indicator.show { opacity: 1; }
        
        /* 标签组件样式 */
        .tags-container { display: flex; flex-wrap: wrap; gap: 8px; padding: 8px; border: 1px solid #ddd; border-radius: 4px; background: #fff; min-height: 42px; cursor: text; }
        .tags-container:focus-within { border-color: #00a1d6; }
        .tag-chip { background: #e7f5ff; color: #00a1d6; padding: 4px 10px; border-radius: 16px; font-size: 13px; display: flex; align-items: center; gap: 6px; user-select: none; }
        .tag-chip .remove { cursor: pointer; font-weight: bold; opacity: 0.6; }
        .tag-chip .remove:hover { opacity: 1; }
        .tag-input { border: none !important; outline: none !important; padding: 4px !important; flex: 1; min-width: 60px; background: transparent; }
    </style>
</head>
<body>
<script src="/static/js/nav.js"></script>

<div class="container">
    <h1 style="display:flex; justify-content:space-between; align-items:center;">
        <span>内容管理 <span id="refresh-hint" class="refresh-indicator">自动刷新中...</span></span>
        <div style="display:flex; gap:10px;">
             <button id="tab-btn-videos" class="upload-btn" onclick="switchTab('videos')" style="background:#00a1d6;">我的视频</button>
             <button id="tab-btn-collections" class="upload-btn" onclick="switchTab('collections')" style="background:#fff; color:#666; border:1px solid #ddd;">我的合集</button>
             <a href="/static/upload.html" class="upload-btn" style="background:#fb7299;">投稿</a>
        </div>
    </h1>

    <!-- Videos Tab -->
    <div id="tab-videos">
        <table>
            <thead>
                <tr>
                    <th width="40%">视频信息</th>
                    <th>数据 (播放/完播)</th>
                    <th>状态</th>
                    <th>时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="video-list">
                <tr><td colspan="5" style="text-align:center;">加载中...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Collections Tab -->
    <div id="tab-collections" style="display:none;">
        <div style="text-align:right; margin:10px 0;">
            <button class="upload-btn" onclick="openCollectionModal()" style="background:#2f9e44;">+ 新建合集</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th width="50%">合集信息</th>
                    <th>视频数</th>
                    <th>创建时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="collection-list">
                <tr><td colspan="4" style="text-align:center;">加载中...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Collection Modal -->
<div id="collectionModal" class="modal">
    <div class="modal-content">
        <h2 id="colModalTitle">创建合集</h2>
        <form id="collectionForm" onsubmit="handleCollectionSubmit(event)">
            <input type="hidden" id="colId">
            <div class="form-group">
                <label>合集标题</label>
                <input type="text" id="colTitle" required placeholder="例如：Python教程系列">
            </div>
            <div class="form-group">
                <label>简介描述</label>
                <textarea id="colDesc" rows="3" placeholder="介绍一下这个合集..."></textarea>
            </div>
            <div class="modal-actions">
                <button type="button" onclick="document.getElementById('collectionModal').style.display='none'" style="padding:8px 16px; margin-right:10px; background:#eee; border:none; border-radius:4px; cursor:pointer;">取消</button>
                <button type="submit" style="padding:8px 16px; background:#00a1d6; color:#fff; border:none; border-radius:4px; cursor:pointer;">保存</button>
            </div>
        </form>
    </div>
</div>


<!-- 编辑弹窗 -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <h2>编辑视频</h2>
        <form id="editForm" onsubmit="handleUpdate(event)">
            <input type="hidden" id="editId">
            <div class="form-group">
                <label>标题</label>
                <input type="text" id="editTitle" required>
            </div>
            
            <div class="form-group">
                <label>封面设置</label>
                <div style="display:flex; gap:10px; align-items:center;">
                    <img id="editThumbPreview" src="" style="width:80px; height:45px; object-fit:cover; border:1px solid #eee; background:#f0f0f0;">
                    <button type="button" class="action-btn" onclick="regenerateThumb()">🎲 随机生成</button>
                    <button type="button" class="action-btn" onclick="document.getElementById('thumbInput').click()">📁 上传封面</button>
                    <input type="file" id="thumbInput" accept="image/*" style="display:none;" onchange="uploadThumb()">
                </div>
            </div>

            <div style="display:flex; gap:15px;">
                <div class="form-group" style="flex:1;">
                    <label>分类</label>
                    <select id="editCategory"></select>
                </div>
                <div class="form-group" style="width:120px;">
                    <label>可见性</label>
                    <select id="editVisibility">
                        <option value="public">公开</option>
                        <option value="private">仅自己可见</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label>标签 (Tags)</label>
                <div class="tags-container" onclick="document.getElementById('tagInput').focus()">
                    <!-- 动态标签插入这里 -->
                    <input type="text" id="tagInput" class="tag-input" placeholder="输入标签，按空格生成">
                </div>
            </div>

            <div class="modal-actions">
                <button type="button" onclick="closeModal()" style="padding:8px 16px; margin-right:10px; background:#eee; border:none; border-radius:4px; cursor:pointer;">取消</button>
                <button type="submit" style="padding:8px 16px; background:#00a1d6; color:#fff; border:none; border-radius:4px; cursor:pointer;">保存</button>
            </div>
        </form>
    </div>
</div>

<script>
    let refreshTimer = null;
    let categories = [];
    let currentTags = []; 
    const colors = ['#e7f5ff', '#fff0f6', '#ebfbee', '#fff9db', '#f3f0ff'];
    const textColors = ['#00a1d6', '#c2255c', '#2f9e44', '#f08c00', '#7950f2'];

    let currentTab = 'videos';

    document.addEventListener("DOMContentLoaded", async () => {
        const token = localStorage.getItem("access_token");
        if (!token) location.href = "/static/login.html";

        await loadCategories();
        loadMyVideos();
        // refreshTimer = setInterval(loadMyVideos, 3000); // Only auto-refresh videos for now
        initTagInput();
    });

    function switchTab(tab) {
        currentTab = tab;
        document.getElementById("tab-videos").style.display = tab === 'videos' ? 'block' : 'none';
        document.getElementById("tab-collections").style.display = tab === 'collections' ? 'block' : 'none';

        const btnVideos = document.getElementById("tab-btn-videos");
        const btnCols = document.getElementById("tab-btn-collections");

        if (tab === 'videos') {
            btnVideos.style.background = "#00a1d6";
            btnVideos.style.color = "#fff";
            btnVideos.style.border = "none";
            btnCols.style.background = "#fff";
            btnCols.style.color = "#666";
            btnCols.style.border = "1px solid #ddd";
            loadMyVideos();
        } else {
            btnCols.style.background = "#00a1d6";
            btnCols.style.color = "#fff";
            btnCols.style.border = "none";
            btnVideos.style.background = "#fff";
            btnVideos.style.color = "#666";
            btnVideos.style.border = "1px solid #ddd";
            loadMyCollections();
        }
    }

    async function loadMyCollections() {
        const token = localStorage.getItem("access_token");
        try {
            const res = await fetch("/collections?user_id=" + parseJwt(token).sub, { // Need to resolve username to ID or backend supports "me"
                 // Actually backend /collections takes user_id. But "me" logic is better.
                 // Backend: get_collections(user_id=...). If I pass nothing, it lists all? No, existing code:
                 // if user_id: filter.
                 // So I need to pass my user_id.
            });
            // Wait, /collections expects user_id param to filter by user. If not provided, it returns all?
            // Let's check backend code again.
            // Yes.

            // To be safe, let's use /users/me to get ID first or use a new endpoint /users/me/collections.
            // I'll use /users/me first.
            const userRes = await fetch("/users/me", { headers: { "Authorization": "Bearer " + token } });
            const user = await userRes.json();

            const res2 = await fetch("/collections?user_id=" + user.id, {
                headers: { "Authorization": "Bearer " + token }
            });

            if (res2.ok) {
                const cols = await res2.json();
                renderCollections(cols);
            }
        } catch (e) { console.error(e); }
    }

    function parseJwt (token) {
        var base64Url = token.split('.')[1];
        var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        return JSON.parse(jsonPayload);
    }

    function renderCollections(cols) {
        const tbody = document.getElementById("collection-list");
        if (cols.length === 0) {
            tbody.innerHTML = "<tr><td colspan='4' style='text-align:center; padding:40px;'>暂无合集</td></tr>";
            return;
        }

        let html = "";
        cols.forEach(c => {
             html += `<tr>
                <td>
                    <div style="font-weight:bold; font-size:16px;">${c.title}</div>
                    <div style="color:#999; font-size:12px; margin-top:4px;">${c.description || "暂无简介"}</div>
                </td>
                <td>${c.video_count} 个视频</td>
                <td>${new Date(c.created_at).toLocaleDateString()}</td>
                <td>
                    <button class='action-btn' onclick='location.href="/static/collection_manage.html?id=${c.id}"'>管理内容</button>
                    <button class='action-btn delete' onclick='deleteCollection("${c.id}")'>删除</button>
                </td>
            </tr>`;
        });
        tbody.innerHTML = html;
    }

    function openCollectionModal() {
        document.getElementById("colId").value = "";
        document.getElementById("colTitle").value = "";
        document.getElementById("colDesc").value = "";
        document.getElementById("colModalTitle").innerText = "创建合集";
        document.getElementById("collectionModal").style.display = "flex";
    }

    async function handleCollectionSubmit(e) {
        e.preventDefault();
        const title = document.getElementById("colTitle").value;
        const description = document.getElementById("colDesc").value;
        const token = localStorage.getItem("access_token");

        try {
            const res = await fetch("/collections", {
                method: "POST",
                headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" },
                body: JSON.stringify({ title, description })
            });
            if (res.ok) {
                document.getElementById("collectionModal").style.display = "none";
                loadMyCollections();
            } else {
                alert("创建失败");
            }
        } catch(e) { alert("网络错误"); }
    }

    async function deleteCollection(id) {
        if(!confirm("确定删除此合集吗？合集内的视频不会被删除。")) return;
        const token = localStorage.getItem("access_token");
        try {
            const res = await fetch("/collections/" + id, {
                method: "DELETE",
                headers: { "Authorization": "Bearer " + token }
            });
            if (res.ok) loadMyCollections();
            else alert("删除失败");
        } catch(e) { alert("网络错误"); }
    }

    async function loadCategories() {
        try {
            const res = await fetch("/categories");
            if (res.ok) {
                categories = await res.json();
                const select = document.getElementById("editCategory");
                select.innerHTML = ""; 
                categories.forEach(cat => {
                    const opt = document.createElement("option");
                    opt.value = cat.id;
                    opt.text = cat.name;
                    select.appendChild(opt);
                });
            }
        } catch(e) {}
    }

    async function loadMyVideos() {
        const token = localStorage.getItem("access_token");
        try {
            document.getElementById("refresh-hint").classList.add("show");
            const res = await fetch("/users/me/videos", {
                headers: { "Authorization": "Bearer " + token }
            });
            setTimeout(() => document.getElementById("refresh-hint").classList.remove("show"), 500);

            if (res.ok) {
                const videos = await res.json();
                renderTable(videos);
                
                const hasProcessing = videos.some(v => v.status === "processing" || v.status === "pending");
                if (!hasProcessing && refreshTimer) {
                    clearInterval(refreshTimer);
                    refreshTimer = setInterval(loadMyVideos, 10000); 
                }
            }
        } catch (e) { console.error(e); }
    }

    function renderTable(videos) {
        const tbody = document.getElementById("video-list");
        if (videos.length === 0) {
            tbody.innerHTML = "<tr><td colspan='5' style='text-align:center; padding:40px;'>暂无稿件</td></tr>";
            return;
        }
        
        let html = "";
        videos.forEach(v => {
            console.log('Video ID:', v.id, 'Original category_id:', v.category_id, 'Type:', typeof v.category_id); // 添加日志
            const statusClass = v.status === "completed" ? "status-completed" : "";
            const rate = v.views > 0 ? Math.round((v.complete_views / v.views) * 100) + "%" : "0%";
            
            let statusHtml = "";
            if (v.status === "processing") {
                statusHtml = "<div style='font-size:12px; color:#00a1d6;'>转码中 " + (v.progress || 0) + "%</div>" +
                             "<div style='width:100px; height:4px; background:#eee; border-radius:2px; margin-top:4px;'>" +
                             "<div style='width:" + (v.progress || 0) + "%; height:100%; background:#00a1d6; border-radius:2px;'></div></div>";
            } else if (v.status === "failed") {
                statusHtml = "<span class='status-badge' style='color:red; background:#ffe6e6;'>处理失败</span>";
            } else if (v.status === "pending") {
                statusHtml = "<span class='status-badge'>等待处理</span>";
            } else if (v.status === "banned") {
                statusHtml = `<span class='status-badge' style='color:white; background:#f04c49;' title='原因: ${v.ban_reason || "未知"}'>已下架</span><div style="font-size:12px; color:#f04c49; margin-top:4px;">${v.ban_reason || ""}</div>`;
            } else if (v.status === "appealing") {
                statusHtml = "<span class='status-badge' style='color:#f08c00; background:#fff9db;'>申诉中</span>";
            } else {
                statusHtml = "<span class='status-badge " + statusClass + "'>已发布</span>";
            }

            // 安全处理 tags
            const tagArray = Array.isArray(v.tags) ? v.tags : [];
            const tagsStr = tagArray.join(",").replace(/"/g, "&quot;");
            const titleSafe = v.title.replace(/"/g, "&quot;");

            let buttons = `<button class='action-btn' onclick='openEdit("${v.id}", "${titleSafe}", "${v.visibility}", "${(v.category ? v.category.id : "")}", "${tagsStr}", "${(v.thumbnail_path || "")}")'>编辑</button>`;

            if (v.status === "banned") {
                buttons += `<button class='action-btn' style='color:#f08c00;' onclick='appealVideo("${v.id}")'>申诉</button>`;
            }

            buttons += `<button class='action-btn delete' onclick='deleteVideo("${v.id}")'>删除</button>`;

            html += "<tr>" +
                "<td><div class='video-cell'>" +
                "<img src='" + (v.thumbnail_path || "/static/default_thumb.jpg") + "' class='thumb'>" +
                "<div class='video-info'>" +
                "<h4><a href='/static/video.html?id=" + v.id + "' target='_blank'>" + v.title + "</a></h4>" +
                "<span style='font-size:12px; color:#999;'>" + (v.visibility === "private" ? "🔒 私密" : "🌍 公开") + "</span>" +
                "</div></div></td>" +
                "<td><div>" + v.views + " 播放 / " + v.complete_views + " 完播</div>" +
                "<div style='font-size:12px; color:#999;'>完播率: " + rate + "</div></td>" +
                "<td>" + statusHtml + "</td>" +
                "<td>" + new Date(v.created_at).toLocaleDateString() + "</td>" +
                "<td>" + buttons + "</td>" +
                "</tr>";
        });
        tbody.innerHTML = html;
    }

    async function appealVideo(id) {
        const reason = prompt("请输入申诉理由：");
        if (!reason) return;
        const token = localStorage.getItem("access_token");
        try {
            const res = await fetch(`/videos/${id}/appeal`, {
                method: "POST",
                headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" },
                body: JSON.stringify({ reason })
            });
            if (res.ok) {
                alert("申诉已提交");
                loadMyVideos();
            } else {
                alert("提交失败");
            }
        } catch(e) { alert("网络错误"); }
    }

    function openEdit(id, title, visibility, categoryId, tagsStr, thumbPath) {
        document.getElementById("editId").value = id;
        document.getElementById("editTitle").value = title;
        document.getElementById("editVisibility").value = visibility;
        if(categoryId) document.getElementById("editCategory").value = categoryId;
        
        // 恢复标签 (稳健解析)
        currentTags = tagsStr ? tagsStr.split(",").filter(t => t) : [];
        renderTags();
        
        document.getElementById("editThumbPreview").src = thumbPath || "/static/default_thumb.jpg";
        document.getElementById("editModal").style.display = "flex";
    }

    // --- 标签逻辑 ---
    function initTagInput() {
        const input = document.getElementById("tagInput");
        input.addEventListener("keydown", (e) => {
            if (e.key === "Enter" || e.key === " ") {
                e.preventDefault();
                const val = input.value.trim();

                // 限制检查
                if (currentTags.length >= 5) {
                    alert("最多只能添加 5 个标签");
                    return;
                }
                if (val.length > 20) {
                    alert("单个标签不能超过 20 个字符");
                    return;
                }
                // 正则检查: 中文、字母、数字、下划线、空格、横杠、点、加号、井号
                if (!/^[\w\u4e00-\u9fa5\s\-\.\+\#]+$/.test(val)) {
                    alert("标签包含非法字符 (仅允许中文、字母、数字、下划线、空格、横杠、点、加号、井号)");
                    return;
                }

                if (val && !currentTags.includes(val)) {
                    currentTags.push(val);
                    renderTags();
                }
                input.value = "";
            } else if (e.key === "Backspace" && input.value === "" && currentTags.length > 0) {
                currentTags.pop();
                renderTags();
            }
        });
    }

    function renderTags() {
        const container = document.querySelector(".tags-container");
        const input = document.getElementById("tagInput");

        Array.from(container.children).forEach(child => {
            if (child !== input) container.removeChild(child);
        });

        currentTags.forEach((tag, index) => {
            const chip = document.createElement("div");
            chip.className = "tag-chip";
            chip.innerHTML = tag + ' <span class="remove" onclick="removeTag(' + index + ')">×</span>';
            const colorIdx = index % colors.length;
            chip.style.backgroundColor = colors[colorIdx];
            chip.style.color = textColors[colorIdx];
            container.insertBefore(chip, input);
        });

        // 数量达到上限时禁用输入
        if (currentTags.length >= 5) {
            input.disabled = true;
            input.placeholder = "已达标签上限 (5/5)";
        } else {
            input.disabled = false;
            input.placeholder = "输入标签，按空格生成";
            input.focus();
        }
    }
    
    window.removeTag = function(index) {
        currentTags.splice(index, 1);
        renderTags();
    }
    // ----------------

    function closeModal() {
        document.getElementById("editModal").style.display = "none";
    }

    async function handleUpdate(e) {
        e.preventDefault();
        const id = document.getElementById("editId").value;
        const title = document.getElementById("editTitle").value;
        const visibility = document.getElementById("editVisibility").value;
        const category_id = document.getElementById("editCategory").value.toString(); // 确保是字符串
        const token = localStorage.getItem("access_token");

        const currentThumbnailPath = document.getElementById("editThumbPreview").src;
        const temp_thumbnail_path = currentThumbnailPath.startsWith(window.location.origin) ? currentThumbnailPath.substring(window.location.origin.length) : currentThumbnailPath;
        try {
            const res = await fetch("/videos/" + id, {
                method: "PUT",
                headers: { 
                    "Authorization": "Bearer " + token,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ 
                    title, visibility, category_id, 
                    tags: currentTags, // 提交数组
                    temp_thumbnail_path // 添加正确的临时封面路径字段名
                })
            });
            if (res.ok) {
                alert("修改成功");
                closeModal();
                loadMyVideos();
            } else {
                alert("修改失败");
            }
        } catch(e) { alert("网络错误"); }
    }

    async function regenerateThumb() {
        const id = document.getElementById("editId").value;
        const token = localStorage.getItem("access_token");
        if(confirm("确定重新生成封面吗？这将覆盖现有封面。")) {
            try {
                const res = await fetch("/videos/" + id + "/thumbnail/regenerate", {
                    method: "POST",
                    headers: { "Authorization": "Bearer " + token }
                });
                if(res.ok) {
                    const data = await res.json();
                    document.getElementById("editThumbPreview").src = data.url; // 将新临时封面赋值给预览图
                    alert("新封面已生成，请点击保存更改。"); // 提示用户保存
                } else alert("请求失败");
            } catch(e) { alert("请求失败"); }
        }
    }

    async function uploadThumb() {
        const id = document.getElementById("editId").value;
        const file = document.getElementById("thumbInput").files[0];
        if(!file) return;
        
        const formData = new FormData();
        formData.append("file", file);
        const token = localStorage.getItem("access_token");
        
        try {
            const res = await fetch("/videos/" + id + "/thumbnail/upload", {
                method: "POST",
                headers: { "Authorization": "Bearer " + token },
                body: formData
            });
            if(res.ok) {
                const data = await res.json();
                document.getElementById("editThumbPreview").src = data.url;
                alert("封面上传成功，请点击保存更改。");
            } else {
                alert("上传失败");
            }
        } catch(e) { alert("网络错误"); }
    }

    async function deleteVideo(id) {
        if (!confirm("确定要删除这个视频吗？操作不可恢复！")) return;
        const token = localStorage.getItem("access_token");
        try {
            const res = await fetch("/videos/" + id, {
                method: "DELETE",
                headers: { "Authorization": "Bearer " + token }
            });
            if (res.ok) {
                loadMyVideos();
            } else {
                alert("删除失败");
            }
        } catch(e) { alert("网络错误"); }
    }
</script>

version: '3.9'

services:
  # 1. PostgreSQL (数据库)
  postgres:
    image: postgres:15-alpine
    container_name: myvideo_db
    restart: always
    environment:
      POSTGRES_USER: myvideo
      POSTGRES_PASSWORD: myvideo_password
      POSTGRES_DB: myvideo_db
    ports:
      - "5433:5432"
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 2. Redis (消息队列)
  redis:
    image: redis:7-alpine
    container_name: myvideo_redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - ./redis/data:/data
      - ./redis/conf/redis.conf:/usr/local/etc/redis/redis.conf # 可选
    command: redis-server --appendonly yes
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 3. Nginx (网关)
  nginx:
    image: nginx:alpine
    container_name: myvideo_nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/logs:/var/log/nginx
      - ./static:/usr/share/nginx/html:ro # 关键: Nginx 直接读取 /data/myvideo/static (包含 index.html)
    extra_hosts:
      - "host.docker.internal:host-gateway" # 允许容器内访问宿主机
    depends_on:
      - postgres
      - redis
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
